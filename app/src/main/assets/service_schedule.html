                            <div class="search-result-sub">${sku}${sn} · ${eq.equipment_type || ''}</div>
                        `;
                        item.onclick = () => selectEditEquipment(eq);
                        results.appendChild(item);
                    });
                }

                // Always offer create new
                const createBtn = document.createElement('div');
                createBtn.className = 'search-create-btn';
                createBtn.innerHTML = `➕ Add "<strong>${query}</strong>" as new equipment`;
                createBtn.onclick = () => showEditEquipmentCreate(query);
                results.appendChild(createBtn);

                results.classList.add('open');
            } catch (e) { console.warn('Edit equipment search error', e); }
        }, 280);
    }

    function selectEditEquipment(eq) {
        editSelectedEquipmentId = eq.id;
        editEquipmentData = eq;
        const results = document.getElementById('edit_equipResults');
        if (results) results.classList.remove('open');
        const inline = document.getElementById('edit_inlineCreateEquip');
        if (inline) inline.classList.remove('open');

        const chip = document.getElementById('edit_equipChip');
        if (chip) chip.classList.add('show');
        const nameEl = document.getElementById('edit_equipChipName');
        const subEl = document.getElementById('edit_equipChipSub');
        if (nameEl) nameEl.textContent = [eq.manufacturer, eq.model].filter(Boolean).join(' ') || 'Equipment';
        const sku = eq.asset_tag ? `SKU: ${eq.asset_tag} · ` : '';
        const sn  = eq.serial_number ? `SN: ${eq.serial_number}` : 'No S/N';
        if (subEl) subEl.textContent = sku + sn + (eq.equipment_type ? ' · ' + eq.equipment_type : '');

        // Clear search input
        const inp = document.getElementById('edit_equipSearch');
        if (inp) inp.value = '';
    }

    function clearEditEquipment() {
        editSelectedEquipmentId = null;
        editEquipmentData = null;
        const chip = document.getElementById('edit_equipChip');
        if (chip) chip.classList.remove('show');
        const inp = document.getElementById('edit_equipSearch');
        if (inp) inp.value = '';
        const inline = document.getElementById('edit_inlineCreateEquip');
        if (inline) inline.classList.remove('open');
    }

    function showEditEquipmentCreate(query) {
        const results = document.getElementById('edit_equipResults');
        if (results) results.classList.remove('open');
        const inline = document.getElementById('edit_inlineCreateEquip');
        if (inline) {
            const modelIn = document.getElementById('edit_f_model');
            if (modelIn) modelIn.value = query || '';
            inline.classList.add('open');
        }
    }

    async function navigateTo(page) {
        try {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session && session.access_token) {
                const sep = page.includes('?') ? '&' : '?';
                window.location.href = page + sep + '_s=' + btoa(JSON.stringify(session));
                return;
            }
        } catch (e) {}
        window.location.href = page;
    }

    /* ── Ticket actions restored from robust previous version ── */
    function navigateToTicket() {
        if (!selectedTicket) return;
        const t = selectedTicket;
        // Build best address we have (direct, denormalized, or from enriched _customerOrg)
        const org = t._customerOrg || {};
        let addr = [t.address, t.city, t.state, t.zip].filter(Boolean).join(', ');
        if (!addr) addr = [t.customer_address, t.customer_city, t.customer_state].filter(Boolean).join(', ');
        if (!addr) addr = [org.address, org.city, org.state].filter(Boolean).join(', ');
        if (!addr) {
            if (typeof showToast === 'function') showToast('No address on file for navigation', 'error');
            return;
        }
        // geo: URI launches the native Maps app / chooser on Android (best for "start navigation")
        const geo = 'geo:0,0?q=' + encodeURIComponent(addr);
        // Fallback web link (Google Maps directions)
        const web = 'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(addr);

        if (window.Android && typeof Android.openUrl === 'function') {
            try {
                Android.openUrl(geo);
            } catch (e) {
                Android.openUrl(web);
            }
        } else {
            // Web / fallback
            window.open(web, '_blank');
        }
    }

    function createServiceReportFromTicket() {
        if (!selectedTicket) return;
        const t = selectedTicket;
        const params = new URLSearchParams();

        // Customer info (denormalized on ticket or direct fields, or enriched from customer org)
        if (t.customer_name) params.set('cust_name', t.customer_name);
        const org = t._customerOrg || {};
        const cAddr = t.customer_address || t.address || org.address || '';
        if (cAddr) params.set('cust_address', cAddr);
        if (t.customer_city || t.city || org.city) params.set('cust_city', t.customer_city || t.city || org.city);
        if (t.customer_state || t.state || org.state) params.set('cust_state', t.customer_state || t.state || org.state);
        if (t.customer_phone || org.phone) params.set('cust_phone', t.customer_phone || org.phone);

        // Equipment (current schema uses equipment_make / equipment_model on tickets)
        if (t.equipment_make) params.set('equip_make', t.equipment_make);
        if (t.equipment_model) params.set('equip_model', t.equipment_model);
        if (t.serial_number) params.set('serial', t.serial_number);

        // Ticket reference (pre-fills ticketNum and provides context)
        if (t.ticket_number) params.set('ticket_num', t.ticket_number);

        // Optional: service type hint
        if (t.service_type) params.set('svc_type', t.service_type);

        // Use the page helper so _s session token is appended for seamless auth on the target page
        const qs = params.toString();
        navigateTo('service_report.html?' + qs);
    }

    /* ===================== FULL PAGE TICKET DETAIL (not a popup) ===================== */
    async function openFullTicketPage(t) {
        if (!t) return;
        selectedTicket = t;

        // Logical status for display: once a ticket has a service date (i.e. is on the calendar),
        // it should be "Scheduled" even if the DB still says "Awaiting Scheduling".
        let displayStatus = t.status || '—';
        if (t.service_date && t.status === 'Awaiting Scheduling') {
            displayStatus = 'Scheduled';
        }

        // Ensure customer orgs loaded for address enrichment (in case not loaded before opening detail)
        if (!Array.isArray(ticketCustomers) || ticketCustomers.length === 0) {
            await loadTicketCustomers();
        }

        // Ensure engineers are loaded for name resolution (in case page was opened before init completed)
        if (!Array.isArray(engineers) || engineers.length === 0) {
            await loadEngineers();
        }

        // On-demand address enrichment for this specific ticket (belt-and-suspenders for existing data)
        // This helps if global enrichment didn't catch the name match or ticketCustomers wasn't ready.
        if (Array.isArray(ticketCustomers) && ticketCustomers.length > 0 && t.customer_name) {
            const key = t.customer_name.toLowerCase().trim();
            const match = ticketCustomers.find(c => c.name && c.name.toLowerCase().trim() === key);
            if (match) {
                t._customerOrg = match;
                t.customer_address = t.customer_address || match.address || null;
                t.customer_city = t.customer_city || match.city || null;
                t.customer_state = t.customer_state || match.state || null;
                t.customer_phone = t.customer_phone || match.phone || null;
                t.customer_email = t.customer_email || match.email || null;
                if (!t.address && match.address) t.address = match.address;
                if (!t.city && match.city) t.city = match.city;
                if (!t.state && match.state) t.state = match.state;
            }
        }

        // As a last resort, if still no address anywhere, scan the raw ticket object for any address-like keys (helps legacy data)
        if ((!t.address && !t.customer_address && !t._customerOrg) && typeof t === 'object') {
            for (const k of Object.keys(t)) {
                const kl = k.toLowerCase();
                if (kl.includes('address') && t[k] && !t.customer_address) t.customer_address = t[k];
                if ((kl === 'city' || kl.includes('city')) && t[k] && !t.customer_city) t.customer_city = t[k];
                if ((kl === 'state' || kl.includes('state')) && t[k] && !t.customer_state) t.customer_state = t[k];
            }
        }

        // Hide calendar UI for true full-page ticket experience
        const tabs = document.getElementById('scheduleViewTabs');
        const calNav = document.querySelector('.cal-nav');
        const calBody = document.getElementById('calBody');
        if (tabs) tabs.style.display = 'none';
        if (calNav) calNav.style.display = 'none';
        if (calBody) calBody.style.display = 'none';

        const page = document.getElementById('ticketFullPage');
        if (!page) return;

        // Header
        const headerEl = document.getElementById('ticketFullHeader');
        if (headerEl) {
            headerEl.innerHTML = `${t.ticket_number || 'Ticket'} <span style="color:var(--text-muted);font-size:11px;">${displayStatus}</span>`;
        }

        // Resolve assigned engineer name if engineers list is available
        let assignedName = 'Unassigned';
        if (t.assigned_to) {
            if (typeof engineers !== 'undefined' && Array.isArray(engineers)) {
                const eng = engineers.find(e => e.id === t.assigned_to);
                if (eng) assignedName = [eng.first_name, eng.last_name].filter(Boolean).join(' ') || t.assigned_to;
            } else {
                assignedName = t.assigned_to;
            }
        }

        const make = t.equipment_make || '';
        const model = t.equipment_model || '';
        const serial = t.serial_number || '';
        const equipLine = [make, model].filter(Boolean).join(' / ') || '—';
        const serialHtml = serial ? `<span class="ticket-serial">SN: ${serial}</span>` : '—';

        // Build the best possible full address from direct ticket fields, denormalized customer_* fields,
        // or the attached _customerOrg (from enrichment or legacy joins).
        const org = t._customerOrg || {};
        const addrParts = [
            t.address || t.customer_address || org.address,
            t.city || t.customer_city || org.city,
            t.state || t.customer_state || org.state,
            t.zip || org.zip
        ].filter(Boolean);
        const addr = addrParts.length ? addrParts.join(', ') : '—';

        const phone = t.customer_phone || t.phone || org.phone || '—';
        const email = t.customer_email || t.email || org.email || '—';
        const cust = t.customer_name || '—';
        const desc = t.description || t.notes || t.problem || 'No description provided.';
        const svc = t.service_type || '—';
        const when = t.service_date
            ? (t.service_date + (t.scheduled_time ? ' @ ' + t.scheduled_time.slice(0,5) : '') + (t.end_time ? ' – ' + t.end_time.slice(0,5) : ''))
            : 'Unscheduled';

        const contentEl = document.getElementById('ticketFullContent');
        if (contentEl) {
            contentEl.innerHTML = `
                <div class="ticket-section">
                    <div class="ticket-section-hdr">Ticket Information</div>
                    <div class="ticket-section-body">
                        <div class="ticket-field"><div class="ticket-label">Ticket #</div><div class="ticket-value"><strong>${t.ticket_number || '—'}</strong></div></div>
                        <div class="ticket-field"><div class="ticket-label">Status</div><div class="ticket-value">${displayStatus}</div></div>
                        <div class="ticket-field"><div class="ticket-label">Priority</div><div class="ticket-value">${t.priority || 'Medium'}</div></div>
                        <div class="ticket-field"><div class="ticket-label">When</div><div class="ticket-value">${when}</div></div>
                        <div class="ticket-field"><div class="ticket-label">Service Type</div><div class="ticket-value">${svc}</div></div>
                        <div class="ticket-field"><div class="ticket-label">Org ID (debug)</div><div class="ticket-value">${t.organization_id ?? 'null'} — must match your profile's organization_id for UPDATEs</div></div>
                    </div>
                </div>

                <div class="ticket-section">
                    <div class="ticket-section-hdr">Customer</div>
                    <div class="ticket-section-body">
                        <div class="ticket-field"><div class="ticket-label">Name</div><div class="ticket-value"><strong>${cust}</strong></div></div>
                        <div class="ticket-field">
                            <div class="ticket-label">Address</div>
                            <div class="ticket-value">${addr !== '—' ? addr.replace(/, /g, '<br>') : '—'}</div>
                        </div>
                        <div class="ticket-field"><div class="ticket-label">Phone</div><div class="ticket-value">${phone}</div></div>
                        <div class="ticket-field"><div class="ticket-label">Email</div><div class="ticket-value">${email}</div></div>
                    </div>
                </div>

                <div class="ticket-section">
                    <div class="ticket-section-hdr">Equipment</div>
                    <div class="ticket-section-body">
                        <div class="ticket-field"><div class="ticket-label">Make / Model</div><div class="ticket-value">${equipLine}</div></div>
                        <div class="ticket-field"><div class="ticket-label">Serial Number</div><div class="ticket-value">${serialHtml}</div></div>
                    </div>
                </div>

                <div class="ticket-section">
                    <div class="ticket-section-hdr">Assignment</div>
                    <div class="ticket-section-body">
                        <div class="ticket-field"><div class="ticket-label">Assigned To</div><div class="ticket-value">${assignedName}</div></div>
                    </div>
                </div>

                <div class="ticket-section">
                    <div class="ticket-section-hdr">Description / Problem</div>
                    <div class="ticket-section-body" style="white-space:pre-wrap; background:var(--surface); padding:10px; border-radius:6px; border:1px solid var(--border);">
                        ${desc}
                    </div>
                </div>
            `;
        }

        page.style.display = 'block';
    }

    function closeFullTicketPage() {
        const page = document.getElementById('ticketFullPage');
        if (page) page.style.display = 'none';

        const tabs = document.getElementById('scheduleViewTabs');
        const calNav = document.querySelector('.cal-nav');
        const calBody = document.getElementById('calBody');
        if (tabs) tabs.style.display = '';
        if (calNav) calNav.style.display = '';
        if (calBody) calBody.style.display = '';

        if (typeof renderView === 'function') renderView();
    }

    function editCurrentTicket() {
        if (!selectedTicket) return;
        const t = selectedTicket;
        closeFullTicketPage();
        if (typeof openFullTicketEditor === 'function') {
            openFullTicketEditor(t);
        }
    }

    function deleteCurrentTicket() {
        if (!selectedTicket) return;
        if (!confirm(`Delete ticket ${selectedTicket.ticket_number || ''}? This cannot be undone.`)) return;
        (async () => {
            try {
                await supabaseClient.from('service_tickets').delete().eq('id', selectedTicket.id);
                if (typeof showToast === 'function') showToast('Ticket deleted', 'success');
            } catch (e) {
                console.warn('Delete ticket error', e);
            }
            closeFullTicketPage();
            if (typeof loadTickets === 'function') {
                if (!Array.isArray(ticketCustomers) || ticketCustomers.length === 0) {
                    await loadTicketCustomers();
                }
                await loadTickets();
                if (typeof renderView === 'function') renderView();
            }
        })();
    }

    // Auth state listener - ensures tickets load even if session arrives late from Android bridge
    supabaseClient.auth.onAuthStateChange((event, session) => {
        if (session?.user) {
            currentUser = session.user;
            // Re-load role/org in case it settled late (e.g. from Android restore)
            (async () => {
                try {
                    const { data: profile } = await supabaseClient
                        .from('user_profiles')
                        .select('organization_id, role')
                        .eq('id', session.user.id)
                        .maybeSingle();
                    const cand = profile?.organization_id;
                    if (isValidOrgId(cand)) currentUserOrgId = cand;
                    if (profile?.role) currentUserRole = profile.role;
                    applyRoleBasedVisibility();
                } catch(e) {}
                await loadEngineers();
                if (!Array.isArray(ticketCustomers) || ticketCustomers.length === 0) {
                    await loadTicketCustomers();
                }
                await loadTickets();
                if (typeof renderView === 'function') renderView();
            })();
        }
        try {
            if (typeof Android !== 'undefined') {
                if (session?.access_token) Android.saveSession(JSON.stringify(session));
                else if (event === 'SIGNED_OUT' && !session) Android.clearSession();
            }
        } catch(e) {}
    });

    // Final boot
    init();
</script>
