<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Schedule</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold:    #FBBF24;
            --gold-dk: #D97706;
            --bg:      #000;
            --surface: #111;
            --surface2:#1a1a1a;
            --surface3:#222;
            --border:  #2a2a2a;
            --border-gold: #FBBF2444;
            --text:    #fff;
            --text-muted: #888;
            --red:     #ef4444;
            --green:   #22c55e;
            --blue:    #3b82f6;
            --now-line:#FBBF24;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ── Header ── */
        .header {
            background: var(--surface);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
            flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .back-btn {
            background: none; border: none; color: var(--gold);
            font-size: 22px; cursor: pointer; padding: 4px 8px;
            border-radius: 8px; line-height: 1;
        }
        .back-btn:hover { background: var(--surface2); }
        .header-title { font-size: 18px; font-weight: 700; }
        .header-subtitle { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

        .add-btn {
            background: var(--gold);
            color: #111827;
            border: none;
            border-radius: 10px;
            padding: 9px 16px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }
        .add-btn:hover { background: var(--gold-dk); }

        /* ── View tabs ── */
        .view-tabs {
            display: flex;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .view-tab {
            flex: 1;
            padding: 11px 4px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: color 0.15s, border-color 0.15s;
        }
        .view-tab.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }

        /* ── Nav bar (prev/today/next + period label) ── */
        .cal-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .nav-btn {
            background: var(--surface3);
            border: 1px solid var(--border);
            color: var(--text);
            width: 34px; height: 34px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-btn:hover { border-color: var(--gold); color: var(--gold); }
        .today-btn {
            background: var(--surface3);
            border: 1px solid var(--border);
            color: var(--gold);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }
        .today-btn:hover { border-color: var(--gold); }
        .period-label {
            font-size: 15px;
            font-weight: 700;
            text-align: center;
            flex: 1;
            margin: 0 8px;
        }
        .nav-center { display: flex; align-items: center; gap: 8px; flex: 1; justify-content: center; }

        /* ── Scroll container ── */
        .cal-body {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
        }

        /* ════════════════════════════════
           MONTHLY VIEW
        ════════════════════════════════ */
        .month-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }
        .month-dow {
            padding: 8px 4px;
            text-align: center;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
        }
        .month-cell {
            min-height: 80px;
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            padding: 4px;
            cursor: pointer;
            position: relative;
            transition: background 0.1s;
        }
        .month-cell:nth-child(7n) { border-right: none; }
        .month-cell:hover { background: var(--surface2); }
        .month-cell.other-month .day-num { color: #444; }
        .month-cell.today { background: #1a1500; }
        .month-cell.today .day-num {
            background: var(--gold);
            color: #111;
            width: 24px; height: 24px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700;
        }
        .day-num {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 4px;
            width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: center;
        }
        .month-event {
            background: var(--gold);
            color: #111;
            font-size: 10px;
            font-weight: 600;
            border-radius: 4px;
            padding: 2px 4px;
            margin-bottom: 2px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            cursor: pointer;
        }
        .month-event.priority-high   { background: #ef4444; color: #fff; }
        .month-event.priority-medium { background: #f59e0b; color: #111; }
        .month-event.priority-low    { background: #22c55e; color: #111; }
        .month-more {
            font-size: 10px;
            color: var(--text-muted);
            padding: 1px 4px;
        }

        /* ════════════════════════════════
           WEEK / DAY TIME GRID
        ════════════════════════════════ */
        .time-grid-wrap {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        /* Day header row */
        .tg-header {
            display: flex;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .tg-gutter { width: 52px; flex-shrink: 0; border-right: 1px solid var(--border); }
        .tg-day-head {
            flex: 1;
            padding: 8px 4px;
            text-align: center;
            font-size: 12px;
            border-right: 1px solid var(--border);
        }
        .tg-day-head:last-child { border-right: none; }
        .tg-day-name { color: var(--text-muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .tg-day-num  { font-size: 18px; font-weight: 700; margin-top: 2px; }
        .tg-day-num.today-num {
            background: var(--gold);
            color: #111;
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 2px auto 0;
        }

        /* Scrollable time body */
        .tg-body {
            flex: 1;
            overflow-y: auto;
            position: relative;
        }
        .tg-row {
            display: flex;
            position: relative;
        }
        .tg-time {
            width: 52px;
            flex-shrink: 0;
            text-align: right;
            padding: 0 8px 0 0;
            font-size: 10px;
            color: var(--text-muted);
            line-height: 1;
            position: relative;
            top: -6px;
            border-right: 1px solid var(--border);
            user-select: none;
        }
        .tg-cells {
            flex: 1;
            display: flex;
        }
        .tg-cell {
            flex: 1;
            height: 60px;
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            position: relative;
            cursor: pointer;
        }
        .tg-cell:last-child { border-right: none; }
        .tg-cell:hover { background: #ffffff06; }
        .tg-cell.half-hour { border-bottom-color: #1a1a1a; }

        /* Events inside time grid */
        .tg-event {
            position: absolute;
            left: 2px; right: 2px;
            border-radius: 6px;
            padding: 3px 6px;
            font-size: 11px;
            font-weight: 600;
            overflow: hidden;
            cursor: pointer;
            z-index: 2;
            border-left: 3px solid rgba(0,0,0,0.3);
        }
        .tg-event.priority-high   { background: #ef444488; border-left-color: #ef4444; color: #fff; }
        .tg-event.priority-medium { background: #f59e0b88; border-left-color: #f59e0b; color: #111; }
        .tg-event.priority-low    { background: #22c55e88; border-left-color: #22c55e; color: #111; }
        .tg-event-default         { background: #FBBF2488; border-left-color: #FBBF24; color: #111; }
        .tg-event-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .tg-event-time  { font-size: 10px; opacity: 0.8; }

        /* Now line */
        .now-line {
            position: absolute;
            left: 52px; right: 0;
            height: 2px;
            background: var(--now-line);
            z-index: 5;
            pointer-events: none;
        }
        .now-dot {
            position: absolute;
            left: -5px; top: -4px;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--now-line);
        }

        /* ════════════════════════════════
           AGENDA VIEW
        ════════════════════════════════ */
        .agenda-list { padding: 8px 0; }
        .agenda-day-header {
            padding: 12px 16px 6px;
            font-size: 12px;
            font-weight: 700;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 2;
        }
        .agenda-day-header.today-header { color: var(--gold); }
        .agenda-item {
            display: flex;
            align-items: stretch;
            margin: 4px 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.15s;
        }
        .agenda-item:hover { border-color: var(--gold); }
        .agenda-priority-bar { width: 5px; flex-shrink: 0; }
        .agenda-priority-bar.high   { background: var(--red); }
        .agenda-priority-bar.medium { background: #f59e0b; }
        .agenda-priority-bar.low    { background: var(--green); }
        .agenda-content { flex: 1; padding: 10px 12px; }
        .agenda-time { font-size: 12px; color: var(--text-muted); margin-bottom: 2px; }
        .agenda-customer { font-size: 14px; font-weight: 700; }
        .agenda-equipment { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .agenda-ticket { font-size: 11px; color: var(--gold); margin-top: 4px; font-weight: 600; }
        .agenda-meta { display: flex; align-items: center; justify-content: flex-end; padding: 10px 12px; gap: 8px; }
        .priority-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .priority-badge.high   { background: #ef444422; color: #ef4444; border: 1px solid #ef444444; }
        .priority-badge.medium { background: #f59e0b22; color: #f59e0b; border: 1px solid #f59e0b44; }
        .priority-badge.low    { background: #22c55e22; color: #22c55e; border: 1px solid #22c55e44; }
        .agenda-empty {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-muted);
            font-size: 14px;
        }

        /* ════════════════════════════════
           MODAL - Service Request Form
        ════════════════════════════════ */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 3000;
        }
        .modal-overlay.open { display: flex; }
        .modal-sheet {
            background: var(--surface);
            border: 1px solid var(--border-gold);
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-width: 600px;
            max-height: 92vh;
            overflow-y: auto;
            padding: 0 0 40px;
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to   { transform: translateY(0); }
        }
        .modal-handle {
            width: 40px; height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 12px auto 0;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px 12px;
            border-bottom: 1px solid var(--border);
        }
        .modal-title { font-size: 18px; font-weight: 700; color: var(--gold); }
        .modal-close {
            background: none; border: none;
            color: var(--text-muted); font-size: 24px; cursor: pointer;
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
        }
        .modal-close:hover { background: var(--surface2); color: var(--text); }
        .modal-body { padding: 16px 20px 0; }

        /* Ticket number preview */
        .ticket-preview {
            background: var(--surface2);
            border: 1px solid var(--border-gold);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .ticket-icon { font-size: 20px; }
        .ticket-num-label { font-size: 11px; color: var(--text-muted); }
        .ticket-num-val { font-size: 16px; font-weight: 700; color: var(--gold); letter-spacing: 1px; }

        /* Form sections */
        .form-section {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .form-section:last-of-type { border-bottom: none; }
        .form-section-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 12px;
        }
        .form-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .form-group { flex: 1; }
        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 5px;
            font-weight: 600;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus { border-color: var(--gold); }
        .form-group select option { background: var(--surface2); }
        .form-group textarea { resize: vertical; min-height: 80px; }

        /* Time selectors side by side */
        .time-row { display: flex; gap: 10px; }

        /* Ticket format toggle */
        .ticket-format-wrap {
            display: flex;
            gap: 8px;
            margin-bottom: 4px;
        }
        .ticket-format-btn {
            flex: 1;
            padding: 8px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: all 0.15s;
        }
        .ticket-format-btn.active {
            border-color: var(--gold);
            color: var(--gold);
            background: #1a1500;
        }
        .ticket-format-example {
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            margin-top: 4px;
        }

        /* Submit button */
        .form-submit {
            width: 100%;
            padding: 14px;
            background: var(--gold);
            border: none;
            border-radius: 10px;
            color: #111827;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
        }
        .form-submit:hover { background: var(--gold-dk); }
        .form-submit:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ── Appointment detail modal ── */
        .detail-modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 3500;
            padding: 20px;
        }
        .detail-modal.open { display: flex; }
        .detail-card {
            background: var(--surface);
            border: 1px solid var(--border-gold);
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            overflow: hidden;
        }
        .detail-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .detail-ticket { font-size: 12px; color: var(--gold); font-weight: 700; margin-bottom: 4px; }
        .detail-customer { font-size: 18px; font-weight: 700; }
        .detail-body { padding: 16px 20px; }
        .detail-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: flex-start; }
        .detail-icon { font-size: 16px; width: 20px; flex-shrink: 0; }
        .detail-label { font-size: 11px; color: var(--text-muted); }
        .detail-val { font-size: 14px; margin-top: 1px; }
        .detail-actions { display: flex; gap: 10px; padding: 0 20px 20px; }
        .detail-btn {
            flex: 1; padding: 11px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }
        .detail-btn.nav-btn-action { background: var(--green); color: #fff; }
        .detail-btn.edit-btn { background: var(--surface2); color: var(--gold); border: 1px solid var(--gold); }
        .detail-btn.del-btn  { background: #ef444422; color: #ef4444; border: 1px solid #ef444444; }

        /* Loading / toast */
        .toast {
            position: fixed;
            bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--surface2);
            border: 1px solid var(--gold);
            border-radius: 10px;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            z-index: 9999;
            transition: transform 0.3s ease;
            white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { border-color: var(--green); color: var(--green); }
        .toast.error   { border-color: var(--red);   color: var(--red);   }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
</head>
<body>

<!-- ── Header ── -->
<div class="header">
    <div class="header-left">
        <button class="back-btn" onclick="window.location.href='index.html'">←</button>
        <div>
            <div class="header-title">Service Schedule</div>
            <div class="header-subtitle" id="headerSub">Loading...</div>
        </div>
    </div>
    <button class="add-btn" onclick="openNewAppointment()">+ New</button>
</div>

<!-- ── View tabs ── -->
<div class="view-tabs">
    <button class="view-tab active" data-view="month"  onclick="switchView('month')">Month</button>
    <button class="view-tab"        data-view="week"   onclick="switchView('week')">Week</button>
    <button class="view-tab"        data-view="day"    onclick="switchView('day')">Day</button>
    <button class="view-tab"        data-view="agenda" onclick="switchView('agenda')">Agenda</button>
</div>

<!-- ── Nav bar ── -->
<div class="cal-nav">
    <button class="nav-btn" onclick="navPrev()">‹</button>
    <div class="nav-center">
        <button class="today-btn" onclick="goToday()">Today</button>
        <div class="period-label" id="periodLabel">—</div>
    </div>
    <button class="nav-btn" onclick="navNext()">›</button>
</div>

<!-- ── Calendar body ── -->
<div class="cal-body" id="calBody"></div>

<!-- ═══════════════════════════════════════
     NEW APPOINTMENT MODAL
═══════════════════════════════════════ -->
<div class="modal-overlay" id="newApptModal">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-header">
            <div class="modal-title">New Service Request</div>
            <button class="modal-close" onclick="closeNewAppointment()">×</button>
        </div>
        <div class="modal-body">

            <!-- Ticket number preview -->
            <div class="ticket-preview">
                <div class="ticket-icon">🎫</div>
                <div>
                    <div class="ticket-num-label">Ticket Number</div>
                    <div class="ticket-num-val" id="ticketPreview">—</div>
                </div>
            </div>

            <!-- Ticket format chooser -->
            <div class="form-section">
                <div class="form-section-title">Ticket Format</div>
                <div class="ticket-format-wrap">
                    <button class="ticket-format-btn active" id="fmtSeq" onclick="setTicketFormat('seq')">
                        Sequential
                    </button>
                    <button class="ticket-format-btn" id="fmtDate" onclick="setTicketFormat('date')">
                        Date-Based
                    </button>
                </div>
                <div class="ticket-format-example" id="fmtExample">e.g. TSP-0042</div>
            </div>

            <form id="apptForm">
                <!-- Customer -->
                <div class="form-section">
                    <div class="form-section-title">Customer</div>
                    <div class="form-group" style="margin-bottom:10px;">
                        <label>Customer / Facility Name *</label>
                        <input type="text" id="f_customer" required placeholder="e.g. City Medical Center">
                    </div>
                    <div class="form-group" style="margin-bottom:10px;">
                        <label>Street Address</label>
                        <input type="text" id="f_address" placeholder="123 Medical Plaza">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" id="f_city">
                        </div>
                        <div class="form-group" style="max-width:70px;">
                            <label>State</label>
                            <input type="text" id="f_state" maxlength="2" placeholder="CA">
                        </div>
                        <div class="form-group" style="max-width:90px;">
                            <label>ZIP</label>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ═══════════════════════════════════════════════════
//  SUPABASE SETUP
// ═══════════════════════════════════════════════════
const supabaseClient = supabase.createClient(
    'https://yljztfajyvjzqikxdddf.supabase.co',
    'sb_publishable_xWTiWV-DkS4Hp3MZHxpNOw_ASp3p8fy'
);

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let currentView   = 'month';
let cursor        = new Date();   // current navigation anchor
let appointments  = [];           // fetched from Supabase
let ticketFormat  = 'seq';        // 'seq' | 'date'
let nextSeqNum    = 1;
let selectedAppt  = null;
let nowLineTimer  = null;

const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
async function init() {
    setDefaultFormDate();
    await loadAppointments();
    renderView();
    startNowLine();
}

function setDefaultFormDate() {
    const today = new Date();
    document.getElementById('f_date').value = today.toISOString().slice(0,10);
    // Default times
    document.getElementById('f_time_start').value = '09:00';
    document.getElementById('f_time_end').value   = '11:00';
}

// ═══════════════════════════════════════════════════
//  SUPABASE DATA
// ═══════════════════════════════════════════════════
async function loadAppointments() {
    // Try to load from Supabase; fall back to localStorage if table doesn't exist yet
    try {
        const { data, error } = await supabaseClient
            .from('service_appointments')
            .select('*')
            .order('service_date', { ascending: true });

        if (error) throw error;
        appointments = data || [];
    } catch (e) {
        console.warn('Supabase load failed, using localStorage:', e.message);
        const saved = localStorage.getItem('serviceAppointments');
        appointments = saved ? JSON.parse(saved) : [];
    }

    // Determine next sequential number
    const seqNums = appointments
        .map(a => {
            const m = (a.ticket_number || '').match(/TSP-(\d+)/);
            return m ? parseInt(m[1]) : 0;
        });
    nextSeqNum = seqNums.length ? Math.max(...seqNums) + 1 : 1;

    updateTicketPreview();
    updateHeaderSub();
}

async function saveAppointment(appt) {
    try {
        const { data, error } = await supabaseClient
            .from('service_appointments')
            .insert([appt])
            .select()
            .single();

        if (error) throw error;
        appointments.push(data);
        showToast('Service request created! ' + data.ticket_number, 'success');
    } catch (e) {
        console.warn('Supabase save failed, using localStorage:', e.message);
        appt.id = Date.now();
        appointments.push(appt);
        localStorage.setItem('serviceAppointments', JSON.stringify(appointments));
        showToast('Saved locally. ' + appt.ticket_number, 'success');
    }
}

async function deleteAppointment(id) {
    try {
        const { error } = await supabaseClient
            .from('service_appointments')
            .delete()
            .eq('id', id);
        if (error) throw error;
    } catch (e) {
        console.warn('Supabase delete failed:', e.message);
    }
    appointments = appointments.filter(a => a.id !== id);
    localStorage.setItem('serviceAppointments', JSON.stringify(appointments));
}

// ═══════════════════════════════════════════════════
//  TICKET NUMBERS
// ═══════════════════════════════════════════════════
function generateTicketNumber(dateStr) {
    if (ticketFormat === 'seq') {
        return 'TSP-' + String(nextSeqNum).padStart(4, '0');
    } else {
        // Date-based: YYYYMMDD-NNN
        const d = dateStr ? dateStr.replace(/-/g,'') : new Date().toISOString().slice(0,10).replace(/-/g,'');
        const sameDay = appointments.filter(a =>
            (a.ticket_number || '').startsWith(d + '-')
        ).length;
        return d + '-' + String(sameDay + 1).padStart(3,'0');
    }
}

function setTicketFormat(fmt) {
    ticketFormat = fmt;
    document.getElementById('fmtSeq').classList.toggle('active',  fmt === 'seq');
    document.getElementById('fmtDate').classList.toggle('active', fmt === 'date');
    document.getElementById('fmtExample').textContent =
        fmt === 'seq'
        ? 'e.g. TSP-0042'
        : 'e.g. 20260301-001';
    updateTicketPreview();
}

function updateTicketPreview() {
    const dateVal = document.getElementById('f_date')?.value || '';
    document.getElementById('ticketPreview').textContent = generateTicketNumber(dateVal);
}

// ═══════════════════════════════════════════════════
//  VIEW SWITCHING & NAVIGATION
// ═══════════════════════════════════════════════════
function switchView(view) {
    currentView = view;
    document.querySelectorAll('.view-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.view === view);
    });
    renderView();
}

function navPrev() {
    if (currentView === 'month')  cursor.setMonth(cursor.getMonth() - 1);
    else if (currentView === 'week') cursor.setDate(cursor.getDate() - 7);
    else if (currentView === 'day')  cursor.setDate(cursor.getDate() - 1);
    else cursor.setDate(cursor.getDate() - 7);
    renderView();
}

function navNext() {
    if (currentView === 'month')  cursor.setMonth(cursor.getMonth() + 1);
    else if (currentView === 'week') cursor.setDate(cursor.getDate() + 7);
    else if (currentView === 'day')  cursor.setDate(cursor.getDate() + 1);
    else cursor.setDate(cursor.getDate() + 7);
    renderView();
}

function goToday() {
    cursor = new Date();
    renderView();
}

function renderView() {
    const body = document.getElementById('calBody');
    body.innerHTML = '';
    if (currentView === 'month')  renderMonth(body);
    else if (currentView === 'week')  renderWeek(body);
    else if (currentView === 'day')   renderDay(body);
    else renderAgenda(body);
    updateHeaderSub();
}

function updateHeaderSub() {
    const active = appointments.filter(a => a.status !== 'Completed').length;
    document.getElementById('headerSub').textContent =
        active + ' active · ' + appointments.length + ' total';
}

// ═══════════════════════════════════════════════════
//  MONTH VIEW
// ═══════════════════════════════════════════════════
function renderMonth(container) {
    const year  = cursor.getFullYear();
    const month = cursor.getMonth();
    const today = new Date();

    document.getElementById('periodLabel').textContent = MONTHS[month] + ' ' + year;

    const grid = document.createElement('div');
    grid.className = 'month-grid';

    // Day-of-week headers
    DAYS_SHORT.forEach(d => {
        const h = document.createElement('div');
        h.className = 'month-dow';
        h.textContent = d;
        grid.appendChild(h);
    });

    // First day of month & padding
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const daysInPrev  = new Date(year, month, 0).getDate();

    // Previous month filler
    for (let i = firstDay - 1; i >= 0; i--) {
        grid.appendChild(makeMonthCell(year, month - 1, daysInPrev - i, true));
    }
    // Current month
    for (let d = 1; d <= daysInMonth; d++) {
        const isToday = (d === today.getDate() && month === today.getMonth() && year === today.getFullYear());
        grid.appendChild(makeMonthCell(year, month, d, false, isToday));
    }
    // Next month filler
    const total = firstDay + daysInMonth;
    const trailing = total % 7 === 0 ? 0 : 7 - (total % 7);
    for (let d = 1; d <= trailing; d++) {
        grid.appendChild(makeMonthCell(year, month + 1, d, true));
    }

    container.appendChild(grid);
}

function makeMonthCell(year, month, day, otherMonth, isToday) {
    const cell = document.createElement('div');
    cell.className = 'month-cell' + (otherMonth ? ' other-month' : '') + (isToday ? ' today' : '');

    const numWrap = document.createElement('div');
    numWrap.className = 'day-num';
    numWrap.textContent = day;
    cell.appendChild(numWrap);

    // Events on this day
    const cellDate = new Date(year, month, day);
    const dateStr  = toDateStr(cellDate);
    const dayAppts = appointments.filter(a => a.service_date === dateStr);

    const MAX_SHOW = 2;
    dayAppts.slice(0, MAX_SHOW).forEach(appt => {
        const ev = document.createElement('div');
        ev.className = 'month-event priority-' + (appt.priority || 'medium').toLowerCase();
        ev.textContent = (appt.scheduled_time ? appt.scheduled_time.slice(0,5) + ' ' : '') + appt.customer_name;
        ev.onclick = (e) => { e.stopPropagation(); openDetail(appt); };
        cell.appendChild(ev);
    });
    if (dayAppts.length > MAX_SHOW) {
        const more = document.createElement('div');
        more.className = 'month-more';
        more.textContent = '+' + (dayAppts.length - MAX_SHOW) + ' more';
        cell.appendChild(more);
    }

    cell.onclick = () => {
        cursor = new Date(year, month, day);
        switchView('day');
    };

    return cell;
}

// ═══════════════════════════════════════════════════
//  WEEK VIEW
// ═══════════════════════════════════════════════════
function renderWeek(container) {
    const weekStart = getWeekStart(cursor);
    const weekEnd   = new Date(weekStart); weekEnd.setDate(weekEnd.getDate() + 6);
    document.getElementById('periodLabel').textContent =
        formatShortDate(weekStart) + ' – ' + formatShortDate(weekEnd);

    const days = [];
    for (let i = 0; i < 7; i++) {
        const d = new Date(weekStart);
        d.setDate(d.getDate() + i);
        days.push(d);
    }

    renderTimeGrid(container, days, 'week');
}

// ═══════════════════════════════════════════════════
//  DAY VIEW
// ═══════════════════════════════════════════════════
function renderDay(container) {
    const d = new Date(cursor);
    document.getElementById('periodLabel').textContent =
        DAYS_SHORT[d.getDay()] + ', ' + MONTHS[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
    renderTimeGrid(container, [d], 'day');
}

// ═══════════════════════════════════════════════════
//  TIME GRID (shared by Week + Day)
// ═══════════════════════════════════════════════════
function renderTimeGrid(container, days, mode) {
    const today = new Date();
    const wrap  = document.createElement('div');
    wrap.className = 'time-grid-wrap';

    // Header row
    const header = document.createElement('div');
    header.className = 'tg-header';
    const gutter = document.createElement('div');
    gutter.className = 'tg-gutter';
    header.appendChild(gutter);

    days.forEach(d => {
        const isToday = isSameDay(d, today);
        const dh = document.createElement('div');
        dh.className = 'tg-day-head';
        const name = document.createElement('div');
        name.className = 'tg-day-name';
        name.textContent = DAYS_SHORT[d.getDay()];
        const num  = document.createElement('div');
        num.className = 'tg-day-num' + (isToday ? ' today-num' : '');
        num.textContent = d.getDate();
        dh.appendChild(name);
        dh.appendChild(num);
        header.appendChild(dh);
    });
    wrap.appendChild(header);

    // Scrollable body
    const body = document.createElement('div');
    body.className = 'tg-body';
    body.id = 'tgBody';

    // Build column event maps
    const colEvents = days.map(d => {
        const ds = toDateStr(d);
        return appointments.filter(a => a.service_date === ds);
    });

    // 24 hour rows (each = 60px = 1 hour)
    for (let h = 0; h < 24; h++) {
        const row = document.createElement('div');
        row.className = 'tg-row';

        const timeEl = document.createElement('div');
        timeEl.className = 'tg-time';
        if (h > 0) timeEl.textContent = formatHour(h);
        row.appendChild(timeEl);

        const cells = document.createElement('div');
        cells.className = 'tg-cells';

        days.forEach((d, di) => {
            const cell = document.createElement('div');
            cell.className = 'tg-cell';
            cell.onclick = () => {
                cursor = new Date(d);
                const dateStr = toDateStr(d);
                document.getElementById('f_date').value = dateStr;
                document.getElementById('f_time_start').value = String(h).padStart(2,'0') + ':00';
                document.getElementById('f_time_end').value   = String(h+1).padStart(2,'0') + ':00';
                openNewAppointment();
            };
            cells.appendChild(cell);
        });
        row.appendChild(cells);
        body.appendChild(row);
    }

    // Place events as absolute overlays
    days.forEach((d, di) => {
        colEvents[di].forEach(appt => {
            if (!appt.scheduled_time) return;
            const [hh, mm] = appt.scheduled_time.split(':').map(Number);
            const startMin = hh * 60 + mm;

            let endMin = startMin + 60; // default 1hr
            if (appt.end_time) {
                const [eh, em] = appt.end_time.split(':').map(Number);
                endMin = eh * 60 + em;
            }

            const topPx    = (startMin / 60) * 60;
            const heightPx = Math.max(((endMin - startMin) / 60) * 60, 28);
            const leftPct  = (di / days.length) * 100 + 0.5;
            const widthPct = (1 / days.length) * 100 - 1;

            const ev = document.createElement('div');
            ev.className = 'tg-event priority-' + (appt.priority || 'medium').toLowerCase();
            ev.style.cssText = `top:${topPx}px; height:${heightPx}px; left:calc(52px + ${leftPct}%); width:calc(${widthPct}% - 4px); position:absolute;`;

            const title = document.createElement('div');
            title.className = 'tg-event-title';
            title.textContent = appt.customer_name;
            const time = document.createElement('div');
            time.className = 'tg-event-time';
            time.textContent = appt.scheduled_time.slice(0,5) + (appt.end_time ? ' – ' + appt.end_time.slice(0,5) : '');
            ev.appendChild(title);
            ev.appendChild(time);
            ev.onclick = (e) => { e.stopPropagation(); openDetail(appt); };
            body.appendChild(ev);
        });
    });

    // Now line
    const isVisible = days.some(d => isSameDay(d, today));
    if (isVisible) {
        const nowLine = document.createElement('div');
        nowLine.className = 'now-line';
        nowLine.id = 'nowLine';
        const dot = document.createElement('div');
        dot.className = 'now-dot';
        nowLine.appendChild(dot);
        body.appendChild(nowLine);
        positionNowLine(days, mode);
    }

    wrap.appendChild(body);
    container.appendChild(wrap);

    // Scroll to business hours
    requestAnimationFrame(() => {
        body.scrollTop = 7 * 60; // scroll to 7am
    });
}

function positionNowLine(days, mode) {
    const nowLine = document.getElementById('nowLine');
    if (!nowLine) return;
    const now     = new Date();
    const nowMin  = now.getHours() * 60 + now.getMinutes();
    const topPx   = (nowMin / 60) * 60;
    nowLine.style.top = topPx + 'px';
}

function startNowLine() {
    clearInterval(nowLineTimer);
    nowLineTimer = setInterval(() => {
        const nl = document.getElementById('nowLine');
        if (nl) {
            const now = new Date();
            nl.style.top = ((now.getHours() * 60 + now.getMinutes()) / 60 * 60) + 'px';
        }
    }, 60000);
}

// ═══════════════════════════════════════════════════
//  AGENDA VIEW
// ═══════════════════════════════════════════════════
function renderAgenda(container) {
    const today = new Date();
    document.getElementById('periodLabel').textContent = 'Upcoming';

    const list = document.createElement('div');
    list.className = 'agenda-list';

    // Get cursor week start → show 60 days
    const start = new Date(cursor); start.setHours(0,0,0,0);
    const end   = new Date(start);  end.setDate(end.getDate() + 60);

    // Filter and sort
    const upcoming = appointments
        .filter(a => {
            const d = new Date(a.service_date + 'T00:00:00');
            return d >= start && d <= end;
        })
        .sort((a,b) => {
            const dc = a.service_date.localeCompare(b.service_date);
            if (dc !== 0) return dc;
            return (a.scheduled_time || '').localeCompare(b.scheduled_time || '');
        });

    if (upcoming.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'agenda-empty';
        empty.innerHTML = '📅<br><br>No service calls scheduled<br>in the next 60 days.<br><br><span style="color:var(--gold);cursor:pointer;" onclick="openNewAppointment()">+ Schedule one now</span>';
        list.appendChild(empty);
        container.appendChild(list);
        return;
    }

    // Group by date
    const byDate = {};
    upcoming.forEach(a => {
        if (!byDate[a.service_date]) byDate[a.service_date] = [];
        byDate[a.service_date].push(a);
    });

    Object.keys(byDate).sort().forEach(dateStr => {
        const d       = new Date(dateStr + 'T00:00:00');
        const isToday = isSameDay(d, today);

        const header = document.createElement('div');
        header.className = 'agenda-day-header' + (isToday ? ' today-header' : '');
        header.textContent = (isToday ? '▶ TODAY — ' : '') +
            DAYS_SHORT[d.getDay()] + ', ' + MONTHS[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
        list.appendChild(header);

        byDate[dateStr].forEach(appt => {
            const item = document.createElement('div');
            item.className = 'agenda-item';

            const bar = document.createElement('div');
            bar.className = 'agenda-priority-bar ' + (appt.priority || 'medium').toLowerCase();
            item.appendChild(bar);

            const content = document.createElement('div');
            content.className = 'agenda-content';
            content.innerHTML = `
                <div class="agenda-time">${appt.scheduled_time ? appt.scheduled_time.slice(0,5) : 'Time TBD'}${appt.end_time ? ' – ' + appt.end_time.slice(0,5) : ''}</div>
                <div class="agenda-customer">${appt.customer_name}</div>
                <div class="agenda-equipment">${appt.equipment_make || ''} ${appt.equipment_model || ''} · ${appt.service_type || ''}</div>
                <div class="agenda-ticket">${appt.ticket_number}</div>
            `;
            item.appendChild(content);

            const meta = document.createElement('div');
            meta.className = 'agenda-meta';
            const badge = document.createElement('div');
            badge.className = 'priority-badge ' + (appt.priority || 'medium').toLowerCase();
            badge.textContent = appt.priority || 'Medium';
            meta.appendChild(badge);
            item.appendChild(meta);

            item.onclick = () => openDetail(appt);
            list.appendChild(item);
        });
    });

    container.appendChild(list);
}

// ═══════════════════════════════════════════════════
//  NEW APPOINTMENT MODAL
// ═══════════════════════════════════════════════════
function openNewAppointment() {
    updateTicketPreview();
    document.getElementById('newApptModal').classList.add('open');
}

function closeNewAppointment() {
    document.getElementById('newApptModal').classList.remove('open');
}

document.getElementById('f_date').addEventListener('change', updateTicketPreview);

document.getElementById('apptForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitApptBtn');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    const dateVal = document.getElementById('f_date').value;
    const ticketNum = generateTicketNumber(dateVal);

    const appt = {
        ticket_number:   ticketNum,
        customer_name:   document.getElementById('f_customer').value.trim(),
        address:         document.getElementById('f_address').value.trim(),
        city:            document.getElementById('f_city').value.trim(),
        state:           document.getElementById('f_state').value.trim(),
        zip:             document.getElementById('f_zip').value.trim(),
        equipment_make:  document.getElementById('f_make').value,
        equipment_model: document.getElementById('f_model').value.trim(),
        serial_number:   document.getElementById('f_serial').value.trim(),
        equipment_type:  document.getElementById('f_equip_type').value,
        service_date:    dateVal,
        scheduled_time:  document.getElementById('f_time_start').value,
        end_time:        document.getElementById('f_time_end').value,
        priority:        document.getElementById('f_priority').value,
        service_type:    document.getElementById('f_service_type').value,
        description:     document.getElementById('f_description').value.trim(),
        notes:           document.getElementById('f_notes').value.trim(),
        status:          'Scheduled',
        created_at:      new Date().toISOString()
    };

    await saveAppointment(appt);
    nextSeqNum++;

    // Reset form
    document.getElementById('apptForm').reset();
    setDefaultFormDate();
    closeNewAppointment();
    renderView();

    btn.disabled = false;
    btn.textContent = '✓ Create Service Request';
});

// ═══════════════════════════════════════════════════
//  DETAIL MODAL
// ═══════════════════════════════════════════════════
function openDetail(appt) {
    selectedAppt = appt;
    document.getElementById('d_ticket').textContent   = appt.ticket_number;
    document.getElementById('d_customer').textContent = appt.customer_name;

    const dateObj = new Date(appt.service_date + 'T00:00:00');
    const dateFormatted = DAYS_SHORT[dateObj.getDay()] + ', ' +
        MONTHS[dateObj.getMonth()] + ' ' + dateObj.getDate() + ', ' + dateObj.getFullYear();
    const timeStr = appt.scheduled_time ? ' at ' + appt.scheduled_time.slice(0,5) +
        (appt.end_time ? ' – ' + appt.end_time.slice(0,5) : '') : '';
    document.getElementById('d_datetime').textContent  = dateFormatted + timeStr;
    document.getElementById('d_equipment').textContent = [appt.equipment_make, appt.equipment_model, appt.serial_number ? '(SN: '+appt.serial_number+')' : ''].filter(Boolean).join(' ');
    document.getElementById('d_address').textContent   = [appt.address, appt.city, appt.state, appt.zip].filter(Boolean).join(', ') || 'Not specified';
    document.getElementById('d_priority').textContent  = appt.priority || 'Medium';
    document.getElementById('d_stype').textContent     = appt.service_type || '—';
    document.getElementById('d_desc').textContent      = appt.description || '—';

    document.getElementById('detailModal').classList.add('open');
}

function closeDetail() {
    document.getElementById('detailModal').classList.remove('open');
    selectedAppt = null;
}

async function deleteAppt() {
    if (!selectedAppt) return;
    if (!confirm('Delete ticket ' + selectedAppt.ticket_number + '?')) return;
    await deleteAppointment(selectedAppt.id);
    closeDetail();
    renderView();
    showToast('Appointment deleted', 'success');
}

function navigateToAppt() {
    if (!selectedAppt) return;
    const addr = [selectedAppt.address, selectedAppt.city, selectedAppt.state, selectedAppt.zip]
        .filter(Boolean).join(', ');
    const url = addr
        ? 'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(addr)
        : null;
    if (url) {
        if (typeof Android !== 'undefined') Android.openUrl(url);
        else window.open(url, '_blank');
    } else {
        showToast('No address on file', 'error');
    }
}

// ═══════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════
function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className   = 'toast ' + type + ' show';
    setTimeout(() => t.classList.remove('show'), 3000);
}

// ═══════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════
function toDateStr(d) {
    return d.getFullYear() + '-' +
        String(d.getMonth()+1).padStart(2,'0') + '-' +
        String(d.getDate()).padStart(2,'0');
}

function isSameDay(a, b) {
    return a.getFullYear() === b.getFullYear() &&
           a.getMonth()    === b.getMonth()    &&
           a.getDate()     === b.getDate();
}

function getWeekStart(d) {
    const s = new Date(d);
    s.setDate(s.getDate() - s.getDay());
    s.setHours(0,0,0,0);
    return s;
}

function formatShortDate(d) {
    return MONTHS[d.getMonth()].slice(0,3) + ' ' + d.getDate();
}

function formatHour(h) {
    if (h === 0)  return '12 AM';
    if (h === 12) return '12 PM';
    return h < 12 ? h + ' AM' : (h-12) + ' PM';
}

// Close modals on overlay click
document.getElementById('newApptModal').addEventListener('click', function(e) {
    if (e.target === this) closeNewAppointment();
});
document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target === this) closeDetail();
});

// ═══════════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════════
init();
</script>
