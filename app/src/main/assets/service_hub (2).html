<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Hub</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%);
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            max-width: 28rem;
            margin: 0 auto;
            background: #991B1B;
            border-bottom: 1px solid #B91C1C;
            padding: 8px 16px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .nav-items {
            display: flex;
            gap: 24px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            font-size: 10px;
            font-weight: 600;
            transition: color 0.2s;
            cursor: pointer;
        }

        .nav-item-active {
            color: #FBBF24;
            text-shadow: 0 0 8px rgba(251, 191, 36, 0.6);
        }

        .nav-icon {
            font-size: 20px;
            margin-bottom: 2px;
        }

        .login-btn {
            background: #FBBF24;
            color: #111827;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            border: none;
            cursor: pointer;
        }

        .avatar-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #1F2937;
            color: white;
            font-weight: bold;
            font-size: 14px;
            border: 2px solid #FBBF24;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            gap: 30px;
            padding-top: 90px; /* space for fixed top nav */
        }

        .welcome-section {
            text-align: center;
            margin-bottom: 20px;
        }

        .welcome-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .welcome-title {
            font-size: 28px;
            font-weight: 700;
            color: #FBBF24;
            margin-bottom: 8px;
        }

        .welcome-subtitle {
            font-size: 16px;
            color: #ccc;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }

        .service-button {
            background: linear-gradient(135deg, rgba(153, 27, 27, 0.2) 0%, rgba(153, 27, 27, 0.1) 100%);
            border: 2px solid #B91C1C;
            border-radius: 16px;
            padding: 30px 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 20px rgba(153, 27, 27, 0.1);
        }

        .service-button:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(153, 27, 27, 0.2);
            background: linear-gradient(135deg, rgba(153, 27, 27, 0.3) 0%, rgba(153, 27, 27, 0.15) 100%);
        }

        .button-icon {
            font-size: 48px;
        }

        .button-title {
            font-size: 22px;
            font-weight: 700;
            color: #FBBF24;
        }

        .button-description {
            font-size: 14px;
            color: #ddd;
            text-align: center;
            line-height: 1.4;
        }

        .badge {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4caf50;
            color: #4caf50;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .ai-badge {
            background: rgba(33, 150, 243, 0.2);
            border: 1px solid #2196f3;
            color: #2196f3;
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const App = () => {
        const navigateTo = (file) => {
            window.location.href = file;
        };

        return (
            <div className="min-h-screen bg-gray-900">
                {/* Top Navbar */}
                <div className="top-nav">
                    <div className="nav-items">

                        <div className="nav-item" onClick={() => navigateTo('index.html')}>
                            <div className="nav-icon">🏠</div>
                            <div className="nav-label">Home</div>
                        </div>
                        <div className="nav-item" onClick={() => navigateTo('calculators_menu.html')}>
                            <div className="nav-icon">📐</div>
                            <div className="nav-label">Photometry Tools</div>
                        </div>
                    </div>
                    <div className="flex items-center gap-6">
                        <div className="nav-item">
                            <div className="nav-icon">⚙️</div>
                            <div className="nav-label">Settings</div>
                        </div>
                        <button className="login-btn">Login</button>
                    </div>
                </div>

                {/* Your original content - starts below navbar */}
                <div className="content pt-24">
                    <div className="welcome-section">
                        <div className="welcome-icon">🔧</div>
                        <div className="welcome-title">Service Tools</div>
                        <div className="welcome-subtitle">Professional laser service resources</div>
                    </div>

                    <div className="button-container">
                        <div className="service-button" onClick={() => navigateTo('manual_library.html')}>
                            <div className="button-icon">📚</div>
                            <div className="button-title">Service Manuals</div>
                            <div className="button-description">
                                View PDF service manuals organized by manufacturer
                            </div>
                            <div className="badge">PDF Viewer</div>
                        </div>

                        <div className="service-button" onClick={() => navigateTo('zapp.html')}>
                            <div className="button-icon">🤖</div>
                            <div className="button-title">AI Assistant</div>
                            <div className="button-description">
                                Voice-powered troubleshooting with manual search
                            </div>
                            <div className="badge ai-badge">Voice Enabled</div>
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
