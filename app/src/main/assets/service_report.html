    /* ── PDF EXPORT ── */
    async function exportPDF() {
        try {
            const modelSel = document.getElementById('modelSelect');

            // Snapshot current values from DOM before any re-render (to preserve loaded/edited data from preloaded or full load)
            const valueSnapshot = {};
            const clSnapshot = {};
            if (modelSel && modelSel.value) {
                const m = MODELS[modelSel.value];
                if (m && m.params) {
                    m.params.forEach((p, i) => {
                        const el = document.getElementById('param_' + i);
                        if (el) valueSnapshot['param_' + i] = el.value;
                    });
                }
                if (m && m.wavelengths) {
                    m.wavelengths.forEach((wl, wi) => {
                        if (wl.optional) {
                            const el = document.getElementById('optEnable_' + wi);
                            if (el) valueSnapshot['optEnable_' + wi] = el.checked;
                        }
                        if (wl.unit === 'J/cm²') {
                            const asJ = document.getElementById('asJ_' + wi);
                            if (asJ) valueSnapshot['asJ_' + wi] = asJ.checked;
                        }
                        if (wl.bblRect) {
                            const wEl = document.getElementById('bblW_' + wi);
                            const lEl = document.getElementById('bblL_' + wi);
                            if (wEl) valueSnapshot['bblW_' + wi] = wEl.value;
                            if (lEl) valueSnapshot['bblL_' + wi] = lEl.value;
                        } else {
                            const spot = document.getElementById('spot_' + wi);
                            if (spot) valueSnapshot['spot_' + wi] = spot.value;
                        }
                        wl.sets.forEach((s, si) => {
                            const id = 'pwr_' + wi + '_' + si;
                            const el = document.getElementById(id + '_actual');
                            if (el) valueSnapshot[id + '_actual'] = el.value;
                        });
                    });
                }
            }
            // Snapshot test equipment
            const testEquipList = (typeof TEST_EQUIPMENT !== 'undefined' && TEST_EQUIPMENT) ? TEST_EQUIPMENT : [];
            testEquipList.forEach((te, i) => {
                ['model', 'serial', 'cal'].forEach(f => {
                    const el = document.getElementById('te_' + i + '_' + f);
                    if (el) valueSnapshot['te_' + i + '_' + f] = el.value;
                });
            });
            // Snapshot checklist actives (in case re-render)
            ['checkElectrical', 'checkMechanical', 'checkAesthetic'].forEach(cid => {
                document.querySelectorAll('#' + cid + ' .checklist-item').forEach(item => {
                    const label = item.querySelector('.checklist-label')?.textContent || '';
                    const active = item.querySelector('.cl-btn.active');
                    if (active) clSnapshot[cid + '|' + label] = active.textContent;
                });
            });

            // Only force re-render of dynamic model sections if they are not already built
            // (calling onModelChange again would reset all the restored values).
            const perfBody = document.getElementById('perfBody');
            const needsDynamicRender = perfBody && perfBody.querySelectorAll('input[id*="_actual"]').length === 0;

            if (needsDynamicRender && modelSel && modelSel.value) {
                onModelChange();
            }

            // Restore snapshot values after possible re-render
            Object.keys(valueSnapshot).forEach(key => {
                const el = document.getElementById(key);
                if (el) {
                    if (key.includes('optEnable') || key.includes('asJ')) {
                        el.checked = !!valueSnapshot[key];
                    } else {
                        el.value = valueSnapshot[key] || '';
                    }
                }
            });
            // Restore checklist actives
            Object.keys(clSnapshot).forEach(k => {
                const [cid, label] = k.split('|');
                const items = document.querySelectorAll('#' + cid + ' .checklist-item');
                for (let item of items) {
                    if (item.querySelector('.checklist-label')?.textContent === label) {
                        const val = clSnapshot[k];
                        item.querySelectorAll('.cl-btn').forEach(btn => {
                            btn.classList.toggle('active', btn.textContent === val);
                        });
                        break;
                    }
                }
            });
            // Re-calc tols if needed
            if (modelSel && modelSel.value) {
                const m = MODELS[modelSel.value];
                if (m && m.wavelengths) {
                    m.wavelengths.forEach((wl, wi) => {
                        if (wl.optional) {
                            const opt = document.getElementById('optEnable_' + wi);
                            if (opt && !opt.checked) return;
                        }
                        wl.sets.forEach((s, si) => {
                            const id = 'pwr_' + wi + '_' + si;
                            const el = document.getElementById(id + '_actual');
                            if (el && el.value) calcTolUnit(id, s, wi);
                        });
                    });
                }
            }

            // Ensure supporting data for the print header and test equipment table is loaded.
            if (typeof loadTechCompanyInfo === 'function') loadTechCompanyInfo();
            if (typeof loadTestEquipment === 'function') loadTestEquipment();

            // Small delay for any late DOM updates.
            await new Promise(r => setTimeout(r, 80));

            const report = buildPrintHTML();
            const reportNum = document.getElementById('reportNum')?.value || 'TSP';
            const jobName = 'Service Report ' + reportNum;

            // Android: Direct PDF save to Downloads folder (no print dialog)
            // We treat the presence of the native bridge as "we will save" and show success immediately.
            // The native side does the actual work (and may throw on the JS side even on success
            // due to async file write / WebView print internals). Swallow and still show success.
            if (typeof Android !== 'undefined' && Android.printReport) {
                try {
                    Android.printReport(report, jobName);
                } catch(e) {
                    console.warn('Native PDF export threw (but file was likely written):', e);
                }
                showToast('Saving PDF to Downloads folder...', 'success');
                return;
            }

            // Web fallback: open in new window and print
            try {
                var win = window.open('', '_blank');
                if (win) {
                    win.document.write(report);
                    win.document.close();
                    setTimeout(function() { win.print(); }, 500);
                    return;
                }
            } catch(e) {}

            showToast('Export failed — try the web version at repairplanet.net', 'error');
        } catch (e) {
            console.error('Export PDF error in build or setup:', e);
            showToast('Export failed — try the web version at repairplanet.net', 'error');
        }
    }

    function buildPrintHTML() {
        const cache = techCompanyCache;
        const custName    = document.getElementById('custName')?.value || '';
        const custAddress = document.getElementById('custAddress')?.value || '';
        const custCity    = document.getElementById('custCity')?.value || '';
        const custState   = document.getElementById('custState')?.value || '';
        const equipName   = document.getElementById('equipName')?.value || '';
        const serialNum   = document.getElementById('serialNum')?.value || '';
        const reportNum   = document.getElementById('reportNum')?.value || '';
        const dateOut     = document.getElementById('dateOut')?.value || '';
        const nextPm      = document.getElementById('nextPm')?.value || '';
        const engineer    = document.getElementById('engineer')?.value || '';
        const comments    = document.getElementById('comments')?.value || '';
        const modelKey    = document.getElementById('modelSelect')?.value || '';
        const m           = MODELS[modelKey];

        // Checklists
        const collectCLHTML = (containerId, title) => {
            const items = [];
            document.querySelectorAll('#' + containerId + ' .checklist-item').forEach(item => {
                const label = item.querySelector('.checklist-label')?.textContent || '';
                const active = item.querySelector('.cl-btn.active');
                const val = active ? active.textContent : '—';
                const color = val === 'Pass' ? '#16a34a' : val === 'Fail' ? '#dc2626' : '#555';
                items.push('<tr><td style="padding:4px 8px;border-bottom:1px solid #eee">' + label + '</td>' +
                    '<td style="padding:4px 8px;border-bottom:1px solid #eee;font-weight:700;color:' + color + '">' + val + '</td></tr>');
            });
            if (!items.length) return '';
            return '<h3 style="margin:16px 0 8px;color:#111;border-bottom:2px solid #FBBF24;padding-bottom:4px">' + title + '</h3>' +
                   '<table style="width:100%;border-collapse:collapse;font-size:12px">' + items.join('') + '</table>';
        };

        // Performance Testing — read values directly from DOM inputs
        let perfHTML = '';
        if (m && m.wavelengths) {
            let tables = '';
            m.wavelengths.forEach((wl, wi) => {
                // Skip optional modules that aren't enabled
                if (wl.optional) {
                    const optEl = document.getElementById('optEnable_' + wi);
                    if (!optEl || !optEl.checked) return;
                }
                const isFluence = wl.unit === 'J/cm²';
                const unit = wl.unit || '';
                const spotMm = parseFloat(document.getElementById('spot_' + wi)?.value) || wl.spotMm || 10;
                const asJEl  = document.getElementById('asJ_' + wi);
                const asJ    = asJEl ? asJEl.checked : false;

                const entryMode = isFluence && asJ;
                let headerCols, area, spotDesc;
                if (entryMode) {
                    if (wl.bblRect) {
                        const wMm = parseFloat(document.getElementById('bblW_' + wi)?.value) || wl.bblWidthMm || 15;
                        const lMm = parseFloat(document.getElementById('bblL_' + wi)?.value) || wl.bblLengthMm || 30;
                        area = (wMm / 10) * (lMm / 10);
                        spotDesc = wMm + 'mm × ' + lMm + 'mm rectangular crystal';
                    } else {
                        var spotCm = spotMm / 10;
                        area = Math.PI * Math.pow(spotCm / 2, 2);
                        spotDesc = spotMm + 'mm circular spot';
                    }
                    headerCols =
                        '<th style="padding:5px 8px;border:1px solid #ddd;text-align:left">Set (J/cm²)</th>' +
                        '<th style="padding:5px 8px;border:1px solid #ddd;text-align:left">Entered (J)</th>' +
                        '<th style="padding:5px 8px;border:1px solid #ddd;text-align:left">Converted (J/cm²)</th>' +
                        '<th style="padding:5px 8px;border:1px solid #ddd;text-align:left">% Dev</th>' +
                        '<th style="padding:5px 8px;border:1px solid #ddd;text-align:left">Result</th>';
                } else {
                    headerCols =
                        '<th style="padding:5px 8px;border:1px solid #ddd;text-align:left">Set (' + unit + ')</th>' +
                        '<th style="padding:5px 8px;border:1px solid #ddd;text-align:left">Actual (' + unit + ')</th>' +
                        '<th style="padding:5px 8px;border:1px solid #ddd;text-align:left">% Dev</th>' +
                        '<th style="padding:5px 8px;border:1px solid #ddd;text-align:left">Result</th>';
                }
                let rows = '<tr style="background:#f5f5f5">' + headerCols + '</tr>';

                wl.sets.forEach((s, si) => {
                    const id = 'pwr_' + wi + '_' + si;
                    const actualEl = document.getElementById(id + '_actual');
                    const rawActual = actualEl ? parseFloat(actualEl.value) : NaN;
                    let converted = rawActual;
                    if (entryMode && !isNaN(rawActual)) converted = rawActual / area;
                    let devStr = '—', resultStr = '—', resultColor = '#555';
                    const compareVal = entryMode ? converted : rawActual;
                    if (!isNaN(compareVal) && s !== 0) {
                        const ratio = compareVal / s;
                        const pct = ((ratio - 1) * 100).toFixed(1);
                        devStr = pct + '%';
                        const pass = ratio >= 0.9 && ratio <= 1.1;
                        resultStr = pass ? 'PASS' : 'FAIL';
                        resultColor = pass ? '#16a34a' : '#dc2626';
                    }
                    let dataCells;
                    if (entryMode) {
                        dataCells =
                            '<td style="padding:5px 8px;border:1px solid #ddd;text-align:center;font-weight:600">' + s + ' J/cm²</td>' +
                            '<td style="padding:5px 8px;border:1px solid #ddd;text-align:center">' + (isNaN(rawActual) ? '—' : rawActual.toFixed(3) + ' J') + '</td>' +
                            '<td style="padding:5px 8px;border:1px solid #ddd;text-align:center">' + (isNaN(converted) ? '—' : converted.toFixed(3) + ' J/cm²') + '</td>' +
                            '<td style="padding:5px 8px;border:1px solid #ddd;text-align:center">' + devStr + '</td>' +
                            '<td style="padding:5px 8px;border:1px solid #ddd;text-align:center;font-weight:700;color:' + resultColor + '">' + resultStr + '</td>';
                    } else {
                        dataCells =
                            '<td style="padding:5px 8px;border:1px solid #ddd;text-align:center;font-weight:600">' + s + ' ' + unit + '</td>' +
                            '<td style="padding:5px 8px;border:1px solid #ddd;text-align:center">' + (isNaN(rawActual) ? '—' : rawActual.toFixed(3)) + '</td>' +
                            '<td style="padding:5px 8px;border:1px solid #ddd;text-align:center">' + devStr + '</td>' +
                            '<td style="padding:5px 8px;border:1px solid #ddd;text-align:center;font-weight:700;color:' + resultColor + '">' + resultStr + '</td>';
                    }
                    rows += '<tr>' + dataCells + '</tr>';
                });

                const modeNote = entryMode
                    ? ' — Entered as Joules, ' + spotDesc + ' (Area: ' + area.toFixed(3) + ' cm²)'
                    : (isFluence ? (wl.bblRect
                        ? ' — ' + (wl.bblWidthMm||15) + 'mm × ' + (wl.bblLengthMm||30) + 'mm crystal'
                        : ' — ' + spotMm + 'mm spot') : '');
                tables += '<p style="margin:8px 0 4px;font-size:12px;font-weight:700;color:#555">' +
                    (wl.optional ? '📡 ' : '') + wl.name + modeNote + '</p>' +
                    '<table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:10px">' + rows + '</table>';
            });
            if (tables) {
                perfHTML = '<h3 style="margin:16px 0 8px;color:#111;border-bottom:2px solid #FBBF24;padding-bottom:4px">📊 Performance Testing</h3>' + tables;
            }
        }

        // System Parameters
        let paramsHTML = '';
        if (m && m.params && m.params.length) {
            const paramRows = m.params.map((p, i) => {
                const el = document.getElementById('param_' + i);
                const val = el ? el.value : '';
                return '<tr><td style="padding:4px 8px;border-bottom:1px solid #eee;font-weight:600;width:50%">' + p + '</td>' +
                    '<td style="padding:4px 8px;border-bottom:1px solid #eee">' + (val || '—') + '</td></tr>';
            }).join('');
            paramsHTML = '<h3 style="margin:16px 0 8px;color:#111;border-bottom:2px solid #FBBF24;padding-bottom:4px">⚙️ System Parameters</h3>' +
                '<table style="width:100%;border-collapse:collapse;font-size:12px">' + paramRows + '</table>';
        }

        // Electrical Safety
        const gr = parseFloat(document.getElementById('groundRes')?.value);
        const lc = parseFloat(document.getElementById('leakageCur')?.value);
        let safetyHTML = '';
        if (!isNaN(gr) || !isNaN(lc)) {
            const grPass = !isNaN(gr) && gr <= 0.2;
            const lcPass = !isNaN(lc) && lc <= 300;
            safetyHTML = '<h3 style="margin:16px 0 8px;color:#111;border-bottom:2px solid #FBBF24;padding-bottom:4px">🔌 Electrical Safety</h3>' +
                '<table style="width:100%;border-collapse:collapse;font-size:12px">' +
                (!isNaN(gr) ? '<tr><td style="padding:5px 8px;border-bottom:1px solid #eee;font-weight:600">Ground Resistance</td>' +
                    '<td style="padding:5px 8px;border-bottom:1px solid #eee">' + gr.toFixed(3) + ' Ω</td>' +
                    '<td style="padding:5px 8px;border-bottom:1px solid #eee;font-weight:700;color:' + (grPass ? '#16a34a' : '#dc2626') + '">' + (grPass ? 'PASS' : 'FAIL') + ' (≤0.2Ω)</td></tr>' : '') +
                (!isNaN(lc) ? '<tr><td style="padding:5px 8px;border-bottom:1px solid #eee;font-weight:600">Leakage Current</td>' +
                    '<td style="padding:5px 8px;border-bottom:1px solid #eee">' + lc.toFixed(1) + ' μA</td>' +
                    '<td style="padding:5px 8px;border-bottom:1px solid #eee;font-weight:700;color:' + (lcPass ? '#16a34a' : '#dc2626') + '">' + (lcPass ? 'PASS' : 'FAIL') + ' (≤300μA)</td></tr>' : '') +
                '</table>';
        }

        // Test Equipment
        let teHTML = '';
        const testEquipList = (typeof TEST_EQUIPMENT !== 'undefined' && TEST_EQUIPMENT) ? TEST_EQUIPMENT : [];
        if (testEquipList.length) {
            const teRows = testEquipList.map((te, i) => {
                const model  = document.getElementById('te_' + i + '_model')?.value || '';
                const serial = document.getElementById('te_' + i + '_serial')?.value || '';
                const cal    = document.getElementById('te_' + i + '_cal')?.value || '';
                if (!model && !serial) return '';
                return '<tr><td style="padding:4px 8px;border-bottom:1px solid #eee;font-weight:600">' + te.type + '</td>' +
                    '<td style="padding:4px 8px;border-bottom:1px solid #eee">' + model + '</td>' +
                    '<td style="padding:4px 8px;border-bottom:1px solid #eee">' + serial + '</td>' +
                    '<td style="padding:4px 8px;border-bottom:1px solid #eee">' + cal + '</td></tr>';
            }).filter(Boolean).join('');
            if (teRows) {
                teHTML = '<h3 style="margin:16px 0 8px;color:#111;border-bottom:2px solid #FBBF24;padding-bottom:4px">🔧 Test Equipment</h3>' +
                    '<table style="width:100%;border-collapse:collapse;font-size:12px">' +
                    '<tr style="background:#f5f5f5"><th style="padding:5px 8px;border:1px solid #ddd;text-align:left">Type</th>' +
                    '<th style="padding:5px 8px;border:1px solid #ddd;text-align:left">Model</th>' +
                    '<th style="padding:5px 8px;border:1px solid #ddd;text-align:left">Serial</th>' +
                    '<th style="padding:5px 8px;border:1px solid #ddd;text-align:left">Cal Due</th></tr>' +
                    teRows + '</table>';
            }
        }

        // For PDF export, use text-only header. External <img> (even if from cache) can cause the native
        // print WebView / PDF renderer to throw on some devices (no network, CORS, scoped storage, etc.).
        const logoHTML = '';  // text company name is already in the header below
        // (previous: cache.company_logo_url ? '<img src=...>' : ''; )

        return '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Service Report ' + reportNum + '</title>' +
            '<style>body{font-family:Arial,sans-serif;margin:0;padding:20px;color:#111;font-size:13px}' +
            'h3{page-break-after:avoid}table{page-break-inside:avoid}' +
            '.header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #FBBF24;padding-bottom:16px;margin-bottom:20px}' +
            '.company-name{font-size:18px;font-weight:800;color:#111}.company-address{font-size:12px;color:#555;margin-top:3px}' +
            '.report-title{text-align:right}.report-title h1{font-size:22px;color:#111;margin:0}' +
            '.report-num{font-size:14px;color:#B45309;font-weight:700}' +
            '.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;background:#f9f9f9;padding:12px;border-radius:6px;border:1px solid #eee}' +
            '.info-item label{font-size:10px;color:#666;text-transform:uppercase;font-weight:700;display:block;margin-bottom:2px}' +
            '.info-item span{font-size:13px;font-weight:600;color:#111}' +
            '@media print{body{padding:10px}}</style></head><body>' +
            '<div class="header">' +
                '<div>' + logoHTML +
                    '<div class="company-name">' + (cache.company_name || 'Total Service Pro') + '</div>' +
                    '<div class="company-address">' + [cache.company_address, cache.company_city, cache.company_state].filter(Boolean).join(', ') + '</div>' +
                    '<div class="company-address">' + (cache.company_phone || '') + '</div>' +
                '</div>' +
                '<div class="report-title"><h1>Service Report</h1>' +
                '<div class="report-num">' + reportNum + '</div>' +
                '<div style="font-size:12px;color:#555;margin-top:4px">Date: ' + dateOut + '</div></div>' +
            '</div>' +
            '<div class="info-grid">' +
                '<div class="info-item"><label>Customer</label><span>' + custName + '</span></div>' +
                '<div class="info-item"><label>Address</label><span>' + [custAddress, custCity, custState].filter(Boolean).join(', ') + '</span></div>' +
                '<div class="info-item"><label>Equipment</label><span>' + equipName + '</span></div>' +
                '<div class="info-item"><label>Serial #</label><span>' + serialNum + '</span></div>' +
                '<div class="info-item"><label>Service Engineer</label><span>' + engineer + '</span></div>' +
                '<div class="info-item"><label>Next PM Due</label><span>' + nextPm + '</span></div>' +
            '</div>' +
            collectCLHTML('checkElectrical', '⚡ Electrical Checklist') +
            collectCLHTML('checkMechanical', '🔧 Mechanical & Optical') +
            collectCLHTML('checkAesthetic',  '🎨 Aesthetic Condition') +
            perfHTML +
            paramsHTML +
            safetyHTML +
            teHTML +
            (comments ? '<h3 style="margin:16px 0 8px;color:#111;border-bottom:2px solid #FBBF24;padding-bottom:4px">💬 Comments & Notes</h3>' +
                '<p style="font-size:13px;line-height:1.6;background:#f9f9f9;padding:10px;border-radius:4px">' + comments + '</p>' : '') +
            '<div style="margin-top:32px;border-top:2px solid #FBBF24;padding-top:16px">' +
                '<div style="display:flex;justify-content:space-between;font-size:12px;color:#555;margin-bottom:24px">' +
                    '<div>Technician: <strong>' + engineer + '</strong></div>' +
                    '<div>Date of Service: ' + dateOut + '</div>' +
                '</div>' +
                '<div style="display:grid;grid-template-columns:1fr 1fr;gap:30px;font-size:12px">' +
                    '<div style="border-top:1px solid #999;padding-top:8px;color:#555">Technician Signature</div>' +
                    '<div style="border-top:1px solid #999;padding-top:8px;color:#555">Customer Signature &amp; Date</div>' +
                '</div>' +
            '</div>' +
            '</body></html>';
    }

    /* ── UI HELPERS ── */
    function toggleSection(hdr) {
        hdr.classList.toggle('collapsed');
        const body = hdr.nextElementSibling;
        body.classList.toggle('hidden');
    }
    function setSvcType(btn) {
        document.querySelectorAll('.svc-toggle').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        serviceType = btn.dataset.val;
    }
    function showToast(msg, type) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast ' + type + ' show';
        setTimeout(() => t.classList.remove('show'), 3000);
    }
    function goBack() {
        try { if (typeof Android !== 'undefined') { Android.goBack(); return; } } catch(e) {}
        if (document.referrer) window.history.back();
        else navTo('index.html');
    }

    /* ── NAV & AUTH ── */
    async function goToTestEquip(e) {
        e.stopPropagation();
        navTo('test_equipment.html');
    }

    async function navTo(page) {
        try {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session && session.access_token) {
                const sep = page.includes('?') ? '&' : '?';
                window.location.href = page + sep + '_s=' + btoa(JSON.stringify(session));
                return;
            }
        } catch(e) {}
        window.location.href = page;
    }
    function toggleDropdown(e) {
        e.stopPropagation();
        document.getElementById('avatarDropdown').classList.toggle('open');
    }
    document.addEventListener('click', () => document.getElementById('avatarDropdown').classList.remove('open'));
    async function logoutUser() {
        document.getElementById('avatarDropdown').classList.remove('open');
        await supabaseClient.auth.signOut();
        try { if (typeof Android !== 'undefined') Android.clearSession(); } catch(e) {}
    }

    supabaseClient.auth.onAuthStateChange(function(event, session) {
        // Always ensure UI + currentUser are updated when auth state changes.
        // The previous _sessionRestored guard was suppressing the user fetch on cross-page navigation.
        updateAuthUI();
        try {
            if (typeof Android !== 'undefined') {
                if (session?.access_token) Android.saveSession(JSON.stringify(session));
                else if (event === 'SIGNED_OUT' && !session) Android.clearSession();
            }
        } catch(e) {}
    });

    // Session already applied in <head> — just update UI
    // Android bridge: save session after auth state change handles it

    async function updateAuthUI() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        currentUser = user;

        if (user && !currentUserOrgId) {
            try {
                const { data: profile } = await supabaseClient
                    .from('user_profiles')
                    .select('organization_id')
                    .eq('id', user.id)
                    .maybeSingle();
                const candidate = profile?.organization_id;
                if (isValidOrgId(candidate)) {
                    currentUserOrgId = candidate;
                } else {
                    currentUserOrgId = null;
                }
            } catch(e) {}
        }
        const loginBtn = document.getElementById('loginBtn');
        const wrap = document.getElementById('avatarWrapper');
        if (user) {
            loginBtn.style.display = 'none';
            wrap.style.display = 'block';
            const meta = user.user_metadata || {};
            const fn = meta.first_name || '';
            const ln = meta.last_name || '';
            const initials = ((fn[0]||'') + (ln[0]||'')).toUpperCase() || (user.email||'U')[0].toUpperCase();
            document.getElementById('dropdownName').textContent = [fn, ln].filter(Boolean).join(' ') || 'User';
            document.getElementById('dropdownEmail').textContent = user.email || '';
            const photo = meta.avatar_url || meta.picture || '';
            const img = document.getElementById('avatarImg');
            const ini = document.getElementById('avatarInitials');
            if (photo) { img.src = photo; img.style.display = 'block'; ini.style.display = 'none'; }
            else { img.style.display = 'none'; ini.style.display = 'flex'; ini.textContent = initials; }
            document.getElementById('engineer').value = [fn, ln].filter(Boolean).join(' ') || user.email;
            loadTechCompanyInfo();
            loadTestEquipment();
            loadCustomers();
        } else {
            loginBtn.style.display = 'block';
            wrap.style.display = 'none';
        }
    }
    // Always run updateAuthUI so currentUser is populated even when a session
    // was injected via the _s= param from another page (Reports List, etc.).
    // onAuthStateChange will also fire, but calling it here is safe and ensures
    // currentUser is ready as early as possible for saveReport / loadReport.
    updateAuthUI();

    // Pre-populate from URL params passed by service_schedule.html
    (function preFillFromParams() {
        const p = new URLSearchParams(window.location.search);

        // If report_id param present, load that specific report (takes priority)
        const reportId = p.get('report_id');
        if (reportId) {
            // Ensure we have a user before attempting to load (handles timing when
            // arriving via _s= param from Reports List).
            (async () => {
                if (!currentUser) {
                    try {
                        const { data: { user } } = await supabaseClient.auth.getUser();
                        if (user) currentUser = user;
                    } catch (e) {}
                }
                if (currentUser) {
                    loadReport(reportId);
                } else {
                    // As a last resort, still try — loadReport itself will show errors
                    loadReport(reportId);
                }
            })();
            return; // Don't pre-fill when loading an existing report
        }

        // Helper: set value if element exists and value is non-empty
        const set = (id, val) => {
            const el = document.getElementById(id);
            if (el && val && val.trim()) el.value = val.trim();
        };

        // Customer fields
        set('custName',    p.get('cust_name'));
        set('custAddress', p.get('cust_address'));
        set('custCity',    p.get('cust_city'));
        set('custState',   p.get('cust_state'));
        set('custZip',     p.get('cust_zip'));
        set('custPhone',   p.get('cust_phone'));

        // Equipment
        set('serialNum',   p.get('serial'));
        set('ticketNum',   p.get('ticket_num'));

        // equipName = make + model combined display
        const equipMake  = p.get('equip_make')  || '';
        const equipModel = p.get('equip_model') || '';
        const equipName  = [equipMake, equipModel].filter(Boolean).join(' ');
        set('equipName', equipName);

        // Pre-select manufacturer dropdown by matching equip_make
        const mfg = equipMake || p.get('mfg') || '';
        if (mfg) {
            const mfgSel = document.getElementById('mfgSelect');
            if (mfgSel) {
                // Try exact match first, then partial
                const mfgLower = mfg.toLowerCase();
                const match = Array.from(mfgSel.options).find(o =>
                    o.value.toLowerCase() === mfgLower
                ) || Array.from(mfgSel.options).find(o =>
                    o.value.toLowerCase().includes(mfgLower) ||
                    mfgLower.includes(o.value.toLowerCase())
                );
                if (match) {
                    mfgSel.value = match.value;
                    onMfgChange(); // populate model dropdown

                    // Now try to select the correct model
                    if (equipModel) {
                        setTimeout(() => {
                            const modelSel = document.getElementById('modelSelect');
                            if (modelSel) {
                                const modelLower = equipModel.toLowerCase();
                                const modelMatch = Array.from(modelSel.options).find(o =>
                                    o.text.toLowerCase().includes(modelLower) ||
                                    modelLower.includes(o.text.toLowerCase().replace(/[™®]/g,''))
                                );
                                if (modelMatch) {
                                    modelSel.value = modelMatch.value;
                                    onModelChange(); // load performance section
                                }
                            }
                        }, 50);
                    }
                }
            }
        }
    })();
</script>
