<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Viewer · TSP</title>
    <script>
        var _pendingSession = null;
        (function() {
            try {
                const enc = new URLSearchParams(window.location.search).get('_s');
                if (enc) {
                    const s = JSON.parse(atob(enc));
                    if (s && s.access_token) {
                        _pendingSession = s;
                        localStorage.setItem('tsp-auth-token', JSON.stringify({ currentSession: s, expiresAt: s.expires_at }));
                        const u = new URL(window.location.href); u.searchParams.delete('_s');
                        window.history.replaceState({}, '', u.toString());
                        return;
                    }
                }
                const raw = localStorage.getItem('tsp-auth-token');
                if (raw) { const p = JSON.parse(raw); const sess = p?.currentSession || (p?.access_token ? p : null); if (sess?.access_token) _pendingSession = sess; }
            } catch(e) {}
        })();
        function restoreSession(jsonStr) {
            try {
                const parsed = typeof jsonStr === 'string' ? JSON.parse(jsonStr) : jsonStr;
                const session = parsed?.currentSession || parsed;
                if (session?.access_token) {
                    localStorage.setItem('tsp-auth-token', JSON.stringify({ currentSession: session, expiresAt: session.expires_at }));
                    if (typeof _sb !== 'undefined') {
                        _sb.auth.setSession({ access_token: session.access_token, refresh_token: session.refresh_token });
                    } else { _pendingSession = session; }
                }
            } catch(e) {}
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="tsp.css">
    <style>
        body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .viewer-header {
            background: var(--surface); border-bottom: 1px solid var(--gold);
            padding: 10px 14px; display: flex; align-items: center; gap: 10px;
            flex-shrink: 0; z-index: 100;
        }
        .viewer-back { background: none; border: none; color: var(--gold); font-size: 22px; cursor: pointer; padding: 4px 8px; border-radius: 8px; line-height: 1; flex-shrink: 0; }
        .viewer-back:active { background: var(--surface3); }
        .viewer-info { flex: 1; min-width: 0; }
        .viewer-title { font-size: 14px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .viewer-brand { font-size: 11px; color: var(--text3); margin-top: 1px; }
        .toc-btn { background: none; border: 1px solid var(--border2); border-radius: 8px; padding: 6px 10px; color: var(--text2); font-family: inherit; font-size: 12px; cursor: pointer; flex-shrink: 0; transition: all 0.15s; }
        .toc-btn:hover { border-color: var(--gold-border); color: var(--gold); }
        .pdf-frame-wrap { flex: 1; position: relative; overflow: hidden; }
        #pdfFrame { width: 100%; height: 100%; border: none; display: none; }
        #pdfFrame.visible { display: block; }
        .loading-screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; background: var(--bg); }
        .loading-screen.hidden { display: none; }
        .loading-label { font-size: 13px; color: var(--text3); }
        .error-screen { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 24px; gap: 12px; background: var(--bg); }
        .error-screen.visible { display: flex; }
        .error-icon { font-size: 48px; }
        .error-title { font-size: 16px; font-weight: 700; color: var(--red); }
        .error-msg { font-size: 13px; color: var(--text3); line-height: 1.5; max-width: 280px; }
        .toc-drawer { position: absolute; top: 0; left: 0; bottom: 0; width: 80%; max-width: 300px; background: var(--surface2); border-right: 1px solid var(--border2); transform: translateX(-100%); transition: transform 0.25s ease; z-index: 200; display: flex; flex-direction: column; overflow: hidden; }
        .toc-drawer.open { transform: translateX(0); }
        .toc-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); z-index: 199; display: none; }
        .toc-overlay.open { display: block; }
        .toc-header { padding: 14px 16px; border-bottom: 1px solid var(--border2); display: flex; align-items: center; justify-content: space-between; }
        .toc-header-title { font-size: 14px; font-weight: 700; color: var(--gold); }
        .toc-close { background: none; border: none; color: var(--text3); font-size: 22px; cursor: pointer; }
        .toc-list { flex: 1; overflow-y: auto; padding: 8px 0; }
        .toc-item { display: block; width: 100%; padding: 11px 16px; background: none; border: none; color: var(--text2); font-family: inherit; font-size: 13px; text-align: left; cursor: pointer; transition: background 0.1s; border-bottom: 1px solid var(--border); }
        .toc-item:hover { background: var(--surface3); color: var(--text); }
        .toc-item-brand { font-size: 10px; color: var(--text3); display: block; margin-top: 2px; }
        .toc-empty { padding: 24px 16px; font-size: 13px; color: var(--text3); text-align: center; }
    </style>
</head>
<body>

<div class="viewer-header">
    <button class="viewer-back" onclick="goBack()">‹</button>
    <div class="viewer-info">
        <div class="viewer-title" id="viewerTitle">Loading...</div>
        <div class="viewer-brand" id="viewerBrand"></div>
    </div>
    <button class="toc-btn" id="tocBtn" onclick="openTOC()" style="display:none;">📋 Contents</button>
</div>

<div class="pdf-frame-wrap">
    <div class="loading-screen" id="loadingScreen">
        <div class="spinner"></div>
        <div class="loading-label" id="loadingLabel">Getting access...</div>
    </div>
    <div class="error-screen" id="errorScreen">
        <div class="error-icon">⚠️</div>
        <div class="error-title" id="errorTitle">Could not load manual</div>
        <div class="error-msg" id="errorMsg">Please check your connection and try again.</div>
        <button class="btn btn-ghost" style="margin-top:8px;" onclick="goBack()">← Go Back</button>
    </div>
    <iframe id="pdfFrame"></iframe>
    <div class="toc-overlay" id="tocOverlay" onclick="closeTOC()"></div>
    <div class="toc-drawer" id="tocDrawer">
        <div class="toc-header">
            <span class="toc-header-title">Contents</span>
            <button class="toc-close" onclick="closeTOC()">×</button>
        </div>
        <div class="toc-list" id="tocList"><div class="toc-empty">Loading...</div></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const _sb = supabase.createClient(
        'https://yljztfajyvjzqikxdddf.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlsanp0ZmFqeXZqenFpa3hkZGRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk2MjMzMDYsImV4cCI6MjA4NTE5OTMwNn0.O3qRONKT4XdEoSZTPg0Lg_tLyThMxRAMWjGwHy5W5JM',
        { auth: { persistSession: true, storageKey: 'tsp-auth-token', storage: window.localStorage, autoRefreshToken: true, detectSessionInUrl: false } }
    );

    const EDGE_URL = 'https://yljztfajyvjzqikxdddf.supabase.co/functions/v1/get-manual-url';

    // Read URL params
    const params      = new URLSearchParams(window.location.search);
    const manualTitle = params.get('title')        || 'Service Manual';
    const manualBrand = params.get('brand')        || '';
    const storagePath = params.get('storage_path') || '';

    document.getElementById('viewerTitle').textContent = manualTitle;
    document.getElementById('viewerBrand').textContent = manualBrand;

    _sb.auth.onAuthStateChange((event, session) => {
        try { if (typeof Android !== 'undefined') { if (session?.access_token) Android.saveSession(JSON.stringify(session)); else if (event === 'SIGNED_OUT' && !session) Android.clearSession(); } } catch(e) {}
    });

    async function init() {
        if (_pendingSession) {
            try { await _sb.auth.setSession({ access_token: _pendingSession.access_token, refresh_token: _pendingSession.refresh_token }); } catch(e) {}
            _pendingSession = null;
        }
        const { data: { session } } = await _sb.auth.getSession();
        if (!session) { showError('Not signed in', 'Please sign in to view manuals.'); return; }
        if (!storagePath) { showError('Invalid link', 'No manual path was provided.'); return; }
        setLoading('Fetching manual...');
        loadPDF(session.access_token);
    }

    async function loadPDF(token) {
        try {
            let targetPath = storagePath;

            // If path is a folder (no .pdf extension), list it and pick the first PDF
            if (!storagePath.toLowerCase().endsWith('.pdf')) {
                setLoading('Finding manual files...');
                const listResp = await fetch(EDGE_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ storage_path: storagePath, action: 'list' })
                });
                const listData = await listResp.json();
                if (!listResp.ok || !listData.files) { showError('Access denied', listData.error || 'Could not list manual folder.'); return; }
                const pdfs = listData.files.filter(f => f.name.toLowerCase().endsWith('.pdf'));
                if (!pdfs.length) { showError('No files found', 'This manual folder appears to be empty.'); return; }
                // Normalize dir to lowercase+underscores, preserve filename casing
                const dirNorm = storagePath.toLowerCase().replace(/ /g, '_');
                targetPath = dirNorm + '/' + pdfs[0].name;
                // Populate TOC if multiple PDFs
                if (pdfs.length > 1) {
                    populateTOC(pdfs, storagePath);
                    document.getElementById('tocBtn').style.display = 'block';
                }
            }

            setLoading('Fetching manual...');
            const resp = await fetch(EDGE_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ storage_path: targetPath })
            });
            const data = await resp.json();
            if (!resp.ok || !data.url) { showError('Access denied', data.error || 'Manual not in your library.'); return; }

            await openInViewer(data.url);

        } catch(e) {
            showError('Connection error', e.message || 'Please check your connection.');
        }
    }

    // Fetch PDF as blob to avoid WebView CORS/redirect issues with signed URLs
    async function openInViewer(signedUrl) {
        setLoading('Loading PDF...');
        try {
            const pdfResp = await fetch(signedUrl);
            if (!pdfResp.ok) { showError('Download failed', 'Could not download PDF. Please try again.'); return; }
            const blob = await pdfResp.blob();
            const blobUrl = URL.createObjectURL(blob);
            const frame = document.getElementById('pdfFrame');
            frame.src = './pdfjs/web/viewer.html?file=' + encodeURIComponent(blobUrl);
            frame.onload = function() {
                document.getElementById('loadingScreen').classList.add('hidden');
                frame.classList.add('visible');
                try { if (typeof Android !== 'undefined') Android.showToast('📖 ' + manualTitle); } catch(e) {}
            };
            frame.onerror = function() { showError('Load failed', 'Could not open the PDF viewer.'); };
        } catch(e) {
            showError('Load failed', e.message || 'Could not load the PDF.');
        }
    }

    function populateTOC(pdfs, folderPath) {
        const tocList = document.getElementById('tocList'); tocList.innerHTML = '';
        pdfs.forEach(f => {
            const btn = document.createElement('button'); btn.className = 'toc-item';
            const dirNorm = folderPath.toLowerCase().replace(/ /g, '_');
            const filePath = dirNorm + '/' + f.name;
            const label = f.name.replace(/\.pdf$/i, '').replace(/_/g, ' ');
            btn.innerHTML = label + '<span class="toc-item-brand">' + manualBrand + '</span>';
            btn.onclick = () => handleCrossDocLink(filePath);
            tocList.appendChild(btn);
        });
    }

    async function handleCrossDocLink(filePath) {
        closeTOC();
        const { data: { session } } = await _sb.auth.getSession(); if (!session) return;
        setLoading('Loading document...');
        document.getElementById('pdfFrame').classList.remove('visible');
        try {
            const resp = await fetch(EDGE_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token },
                body: JSON.stringify({ storage_path: filePath })
            });
            const data = await resp.json();
            if (!resp.ok || !data.url) { showError('Access denied', data.error || 'Could not load document.'); return; }
            await openInViewer(data.url);
        } catch(e) { showError('Connection error', e.message); }
    }

    function openTOC()  { document.getElementById('tocDrawer').classList.add('open'); document.getElementById('tocOverlay').classList.add('open'); }
    function closeTOC() { document.getElementById('tocDrawer').classList.remove('open'); document.getElementById('tocOverlay').classList.remove('open'); }

    function goBack() {
        try { const s = JSON.parse(localStorage.getItem('tsp-auth-token'))?.currentSession; if (s?.access_token) { window.location.href = 'manual_library.html?_s=' + btoa(JSON.stringify(s)); return; } } catch(e) {}
        window.location.href = 'manual_library.html';
    }
    function setLoading(msg) { document.getElementById('loadingLabel').textContent = msg; document.getElementById('loadingScreen').classList.remove('hidden'); document.getElementById('errorScreen').classList.remove('visible'); }
    function showError(title, msg) { document.getElementById('loadingScreen').classList.add('hidden'); document.getElementById('errorTitle').textContent = title; document.getElementById('errorMsg').textContent = msg; document.getElementById('errorScreen').classList.add('visible'); }

    init();
</script>
</body>
</html>
