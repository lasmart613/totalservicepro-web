<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Invoice · Total Service Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="tsp.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .form-container { max-width: 820px; margin: 0 auto; padding: 20px; }
        .section { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .section h2 { color: var(--gold); margin-bottom: 16px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; color: var(--text3); margin-bottom: 4px; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; }
        .cust-search-wrap { position: relative; }
        .cust-dropdown {
            display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0;
            background: var(--surface2); border: 1px solid var(--gold); border-radius: 10px;
            max-height: 240px; overflow-y: auto; z-index: 300;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .cust-dropdown.open { display: block; }
        .cust-option { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--border); }
        .cust-option:hover { background: var(--surface3); }
        .cust-option-name { font-weight: 700; }
        .cust-option-sub { font-size: 11px; color: var(--text3); }
        .btn-primary { background: var(--gold); color: #111827; border: none; padding: 14px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .btn-secondary { background: none; border: 1px solid var(--border); color: var(--text); padding: 12px 20px; border-radius: 8px; }
    </style>
</head>
<body>
<div class="page" style="max-width:820px;margin:0 auto;padding:20px;">
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:20px;">
        <button onclick="history.back()" style="font-size:22px;background:none;border:none;color:var(--gold);">←</button>
        <h1 style="margin:0;">New Invoice</h1>
    </div>

    <div class="section">
        <h2>Customer Information</h2>

        <div class="form-group">
            <label>Customer / Clinic Name *</label>
            <div class="cust-search-wrap">
                <input id="customer" placeholder="Search or type customer name..." autocomplete="off" oninput="onCustSearch()" onfocus="onCustSearch()">
                <div class="cust-dropdown" id="custDropdown"></div>
            </div>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>Address</label>
                <input id="custAddress" placeholder="Street Address">
            </div>
            <div class="form-group">
                <label>Contact Phone</label>
                <input id="custPhone" type="tel">
            </div>
        </div>
        <div class="grid-2">
            <div class="form-group">
                <label>City</label>
                <input id="custCity">
            </div>
            <div class="form-group" style="display:flex;gap:8px;">
                <div style="flex:1;"><label>State</label><input id="custState" maxlength="2"></div>
                <div style="flex:1;"><label>ZIP</label><input id="custZip"></div>
            </div>
        </div>
    </div>

    <div class="section">
        <h2>Invoice Details</h2>
        <div class="grid-2">
            <div class="form-group">
                <label>Invoice Date</label>
                <input type="date" id="invoiceDate" value="${new Date().toISOString().split('T')[0]}">
            </div>
            <div class="form-group">
                <label>Due Date</label>
                <input type="date" id="dueDate">
            </div>
        </div>

        <div class="form-group">
            <label>Description / Line Items</label>
            <textarea id="description" rows="4" placeholder="Service performed, parts, etc."></textarea>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>Subtotal</label>
                <input type="number" id="subtotal" value="0" step="0.01">
            </div>
            <div class="form-group">
                <label>Tax</label>
                <input type="number" id="tax" value="0" step="0.01">
            </div>
        </div>
        <div class="form-group">
            <label><strong>Total Due</strong></label>
            <input type="number" id="total" value="0" step="0.01" style="font-size:18px;font-weight:700;">
        </div>
    </div>

    <div style="display:flex; gap:12px; margin-top:20px;">
        <button class="btn-secondary" onclick="history.back()" style="flex:1;">Cancel</button>
        <button class="btn-primary" onclick="saveInvoice()" style="flex:2;">Save Invoice</button>
    </div>
</div>

<script>
    const supabase = supabaseClient; // assumes global from auth bootstrap if present

    let allCustomers = [];

    async function loadCustomers() {
        try {
            const { data } = await supabase
                .from('organizations')
                .select('id, name, address, city, state, phone, email')
                .eq('type', 'customer')
                .order('name');
            allCustomers = data || [];
        } catch(e) {}
    }

    function onCustSearch() {
        // debounce omitted for brevity - same as estimate_generator
        showCustDropdown();
    }

    function showCustDropdown() {
        const input = document.getElementById('customer');
        const dropdown = document.getElementById('custDropdown');
        const q = input.value.trim().toLowerCase();

        const matches = q ? allCustomers.filter(c => c.name.toLowerCase().includes(q)) : allCustomers.slice(0,8);
        dropdown.innerHTML = '';

        matches.forEach(org => {
            const div = document.createElement('div');
            div.className = 'cust-option';
            div.innerHTML = `<div class="cust-option-name">${org.name}</div>`;
            div.onclick = () => selectCustomer(org);
            dropdown.appendChild(div);
        });

        if (q && !matches.find(m => m.name.toLowerCase() === q)) {
            const div = document.createElement('div');
            div.className = 'cust-option';
            div.innerHTML = `<div class="cust-option-new">＋ Create new: "${input.value.trim()}"</div>`;
            div.onclick = () => dropdown.classList.remove('open');
            dropdown.appendChild(div);
        }
        dropdown.classList.add('open');
    }

    function selectCustomer(org) {
        document.getElementById('customer').value = org.name || '';
        document.getElementById('custAddress').value = org.address || '';
        document.getElementById('custCity').value = org.city || '';
        document.getElementById('custPhone').value = org.phone || '';
        document.getElementById('custDropdown').classList.remove('open');
    }

    async function saveInvoice() {
        const customerName = document.getElementById('customer').value.trim();
        if (!customerName) { alert('Customer name is required'); return; }

        // Auto-create customer logic + get user's organization
        let customerOrgId = null;
        let userOrgId = null;
        try {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                const { data: profile } = await supabase
                    .from('user_profiles')
                    .select('organization_id')
                    .eq('id', user.id)
                    .maybeSingle();
                userOrgId = profile?.organization_id || null;
            }

            // Check/create customer org as before...
            const { data: existing } = await supabase
                .from('organizations')
                .select('id')
                .eq('name', customerName)
                .eq('type', 'customer')
                .maybeSingle();

            if (existing) {
                customerOrgId = existing.id;
            } else {
                const newOrg = {
                    name: customerName,
                    address: document.getElementById('custAddress')?.value || null,
                    city: document.getElementById('custCity')?.value || null,
                    state: document.getElementById('custState')?.value || null,
                    phone: document.getElementById('custPhone')?.value || null,
                    email: document.getElementById('custEmail')?.value || null,
                    type: 'customer',
                    is_active: true,
                    created_by: (await supabase.auth.getUser()).data.user?.id || null  // so RLS makes it visible to your service company
                };
                const { data: created } = await supabase
                    .from('organizations')
                    .insert([newOrg])
                    .select('id')
                    .single();
                customerOrgId = created?.id || null;
            }
        } catch(e) {}

        const invoiceData = {
            customer_name: customerName,
            organization_id: userOrgId || customerOrgId,  // prefer the service provider's org
            invoice_date: document.getElementById('invoiceDate').value,
            due_date: document.getElementById('dueDate').value || null,
            description: document.getElementById('description').value,
            subtotal: parseFloat(document.getElementById('subtotal').value) || 0,
            tax: parseFloat(document.getElementById('tax').value) || 0,
            total: parseFloat(document.getElementById('total').value) || 0,
            status: 'draft',
            created_at: new Date().toISOString()
        };

        try {
            const { error } = await supabase.from('service_invoices').insert([invoiceData]);
            if (error) throw error;
            alert('Invoice saved!');
            window.location.href = 'invoices_list.html';
        } catch (err) {
            alert('Failed to save invoice: ' + err.message);
        }
    }

    // Close dropdown on outside click
    document.addEventListener('click', function(e) {
        const wrap = document.querySelector('.cust-search-wrap');
        const dd = document.getElementById('custDropdown');
        if (wrap && dd && !wrap.contains(e.target)) dd.classList.remove('open');
    });

    window.onload = function() {
        loadCustomers();
        // Optional: prefill from URL params if coming from estimate conversion
    }
</script>
</body>
</html>
