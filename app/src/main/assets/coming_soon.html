<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Centralized theme system -->
    <script src="theme.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon · TSP</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="tsp.css">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
        .coming-soon-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 24px; }
        .coming-icon { font-size: 72px; margin-bottom: 20px; }
        .coming-title { font-size: 32px; font-weight: 800; color: var(--gold); margin-bottom: 10px; }
        .coming-sub { font-size: 16px; color: var(--text2); line-height: 1.5; margin-bottom: 32px; }
    </style>
</head>
<body>
<div class="header">
    <button class="header-back" onclick="goBack()">‹</button>
    <div class="header-title">Coming Soon</div>
    <div style="width:40px;"></div>
</div>
<div class="coming-soon-wrap">
    <div class="coming-icon">🚧</div>
    <div class="coming-title">Coming Soon!</div>
    <div class="coming-sub">This feature is currently in development.<br>Check back for updates.</div>
    <button class="btn btn-secondary" onclick="goBack()" style="padding:14px 40px;font-size:16px;">← Go Back</button>
</div>
<footer style="text-align:center;padding:24px;color:var(--text3);font-size:12px;">© 2026 Total Service Pro · All Rights Reserved</footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    var _pendingSession = null;
    (function() {
        try {
            const enc = new URLSearchParams(window.location.search).get('_s');
            if (enc) { const s=JSON.parse(atob(enc)); if(s?.access_token){_pendingSession=s;localStorage.setItem('tsp-auth-token',JSON.stringify({currentSession:s,expiresAt:s.expires_at}));const u=new URL(window.location.href);u.searchParams.delete('_s');window.history.replaceState({},'',u.toString());return;} }
            const raw=localStorage.getItem('tsp-auth-token'); if(raw){const p=JSON.parse(raw);const sess=p?.currentSession||(p?.access_token?p:null);if(sess?.access_token)_pendingSession=sess;}
        } catch(e) {}
    })();
    var supabaseClient = supabase.createClient(
        'https://yljztfajyvjzqikxdddf.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlsanp0ZmFqeXZqenFpa3hkZGRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk2MjMzMDYsImV4cCI6MjA4NTE5OTMwNn0.O3qRONKT4XdEoSZTPg0Lg_tLyThMxRAMWjGwHy5W5JM',
        { auth: { persistSession:true, storageKey:'tsp-auth-token', storage:window.localStorage, autoRefreshToken:true, detectSessionInUrl:false } }
    );
    // _pendingSession applied in goBack() via getSession()
    async function goBack() {
        try { const{data:{session}}=await supabaseClient.auth.getSession(); if(session?.access_token){window.location.href='index.html?_s='+btoa(JSON.stringify(session));return;} } catch(e) {}
        window.location.href='index.html';
    }
</script>
</body>
</html>
