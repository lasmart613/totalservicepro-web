<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%);
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: rgba(255, 215, 0, 0.1);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #ffd700;
        }

        .back-button {
            background: #ffd700;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            color: #1a1a1a;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        .back-button:active {
            transform: scale(0.95);
        }

        .title {
            color: #ffd700;
            font-size: 20px;
            font-weight: 600;
            flex: 1;
            text-align: center;
        }

        .placeholder {
            width: 80px;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            gap: 30px;
        }

        .welcome-section {
            text-align: center;
            margin-bottom: 20px;
        }

        .welcome-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .welcome-title {
            font-size: 28px;
            font-weight: 700;
            color: #ffd700;
            margin-bottom: 8px;
        }

        .welcome-subtitle {
            font-size: 16px;
            color: #aaa;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }

        .service-button {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2) 0%, rgba(255, 215, 0, 0.1) 100%);
            border: 2px solid #ffd700;
            border-radius: 16px;
            padding: 30px 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.1);
        }

        .service-button:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.2);
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.3) 0%, rgba(255, 215, 0, 0.15) 100%);
        }

        .service-button:active {
            transform: translateY(-2px);
        }

        .button-icon {
            font-size: 48px;
        }

        .button-title {
            font-size: 22px;
            font-weight: 700;
            color: #ffd700;
        }

        .button-description {
            font-size: 14px;
            color: #ccc;
            text-align: center;
            line-height: 1.4;
        }

        .badge {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4caf50;
            color: #4caf50;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .ai-badge {
            background: rgba(33, 150, 243, 0.2);
            border: 1px solid #2196f3;
            color: #2196f3;
        }
    </style>
</head>
<body>
<div class="header">
    <button class="back-button" onclick="goBack()">← Back</button>
    <div class="title">🛠️ Service Hub</div>
    <div class="placeholder"></div>
</div>

<div class="content">
    <div class="welcome-section">
        <div class="welcome-icon">🔧</div>
        <div class="welcome-title">Service Tools</div>
        <div class="welcome-subtitle">Professional laser service resources</div>
    </div>

    <div class="button-container">
        <div class="service-button" onclick="openServiceManuals()">
            <div class="button-icon">📚</div>
            <div class="button-title">Service Manuals</div>
            <div class="button-description">
                View PDF service manuals organized by manufacturer
            </div>
            <div class="badge">PDF Viewer</div>
        </div>

        <div class="service-button" onclick="openAIAssistant()">
            <div class="button-icon">🤖</div>
            <div class="button-title">AI Assistant</div>
            <div class="button-description">
                Voice-powered troubleshooting with manual search
            </div>
            <div class="badge ai-badge">Voice Enabled</div>
        </div>
    </div>
</div>

<script>
    function goBack() {
        if (typeof Android !== 'undefined' && Android.goBack) {
            Android.goBack();
        } else {
            console.log('Back navigation not available');
        }
    }

    function openServiceManuals() {
        window.location.href = 'manual_library.html';
    }

    function openAIAssistant() {
        window.location.href = 'ai_assistant.html';
    }
</script>
</body>
</html>
