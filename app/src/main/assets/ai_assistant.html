<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant · TSP</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="tsp.css">
    <script>
        var _pendingSession = null;
        (function() {
            try {
                const p = new URLSearchParams(window.location.search);
                const enc = p.get('_s');
                if (enc) {
                    const session = JSON.parse(atob(enc));
                    if (session && session.access_token) {
                        _pendingSession = session;
                        const stored = { currentSession: session, expiresAt: session.expires_at };
                        localStorage.setItem('tsp-auth-token', JSON.stringify(stored));
                        const url = new URL(window.location.href);
                        url.searchParams.delete('_s');
                        window.history.replaceState({}, '', url.toString());
                        return;
                    }
                }
                const raw = localStorage.getItem('tsp-auth-token');
                if (raw) {
                    const parsed = JSON.parse(raw);
                    const sess = parsed?.currentSession || (parsed?.access_token ? parsed : null);
                    if (sess?.access_token) _pendingSession = sess;
                }
            } catch(e) {}
        })();

        function restoreSession(jsonStr) {
            try {
                const parsed = typeof jsonStr === 'string' ? JSON.parse(jsonStr) : jsonStr;
                const session = parsed?.currentSession || parsed;
                if (session?.access_token) {
                    const stored = { currentSession: session, expiresAt: session.expires_at };
                    localStorage.setItem('tsp-auth-token', JSON.stringify(stored));
                    if (typeof supabaseClient !== 'undefined') {
                        supabaseClient.auth.setSession({
                            access_token: session.access_token,
                            refresh_token: session.refresh_token
                        }).then(() => initPage());
                    } else {
                        _pendingSession = session;
                    }
                }
            } catch(e) {}
        }
    </script>
    <style>
        .chat-outer {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 57px);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .msg { max-width: 85%; display: flex; flex-direction: column; gap: 3px; }
        .msg.user  { align-self: flex-end; align-items: flex-end; }
        .msg.assistant { align-self: flex-start; align-items: flex-start; }
        .msg-bubble { padding: 11px 15px; border-radius: 16px; font-size: 14px; line-height: 1.55; }
        .msg.user .msg-bubble { background: var(--gold); color: #111827; border-radius: 16px 16px 4px 16px; font-weight: 500; }
        .msg.assistant .msg-bubble { background: var(--surface3); color: var(--text2); border: 1px solid var(--border2); border-radius: 16px 16px 16px 4px; }
        .msg-time { font-size: 10px; color: var(--text3); padding: 0 4px; }

        .typing-indicator { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
        .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); animation: tdot 1.2s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes tdot { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

        .chat-input-area {
            padding: 10px 12px;
            background: var(--surface);
            border-top: 1px solid var(--border2);
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }
        .chat-input-area textarea {
            flex: 1; background: var(--surface3); border: 1px solid var(--border2);
            border-radius: 20px; padding: 10px 16px; color: var(--text);
            font-family: inherit; font-size: 14px; outline: none; resize: none;
            height: 42px; max-height: 110px; line-height: 1.4; transition: border-color 0.15s;
        }
        .chat-input-area textarea:focus { border-color: var(--gold); }
        .chat-input-area textarea::placeholder { color: var(--text3); }

        .mic-btn {
            width: 42px; height: 42px; border-radius: 50%;
            background: var(--surface3); border: 1px solid var(--border2);
            color: var(--text3); font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; transition: all 0.2s;
        }
        .mic-btn.listening { background: rgba(239,68,68,0.15); border-color: var(--red); color: var(--red); animation: mic-pulse 1s ease-in-out infinite; }
        @keyframes mic-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }

        .send-btn {
            width: 42px; height: 42px; border-radius: 50%;
            background: var(--gold); border: none; color: #111827; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; transition: all 0.15s;
        }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .send-btn:active { transform: scale(0.94); }

        .context-bar {
            display: flex; flex-direction: column; gap: 8px;
            padding: 10px 14px; background: var(--surface2); border-bottom: 1px solid var(--border);
        }
        .context-row { display: flex; align-items: center; gap: 8px; }
        .context-label { font-size: 11px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 0.8px; white-space: nowrap; width: 80px; flex-shrink: 0; }
        .context-select {
            flex: 1; background: var(--surface3); border: 1px solid var(--border2);
            border-radius: 8px; color: var(--text); font-family: inherit; font-size: 13px;
            padding: 8px 10px; outline: none; transition: border-color 0.15s;
        }
        .context-select:focus { border-color: var(--gold); }
        .context-select.has-value { border-color: rgba(251,191,36,0.4); color: var(--text); }
        #modelRow { opacity: 0.4; pointer-events: none; transition: opacity 0.2s; }
        #modelRow.enabled { opacity: 1; pointer-events: auto; }

        .quick-row {
            display: flex; gap: 8px; overflow-x: auto;
            padding: 10px 14px; background: var(--surface); border-bottom: 1px solid var(--border);
            scrollbar-width: none;
        }
        .quick-row::-webkit-scrollbar { display: none; }
        .quick-chip {
            flex-shrink: 0; padding: 6px 13px; background: var(--surface3);
            border: 1px solid var(--border2); border-radius: 20px;
            font-size: 12px; font-weight: 600; color: var(--text2);
            cursor: pointer; font-family: inherit; white-space: nowrap; transition: all 0.15s;
        }
        .quick-chip:active { background: var(--gold-glow); border-color: var(--gold-border); color: var(--gold); }

        .premium-gate {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; flex: 1; text-align: center; padding: 40px 24px;
        }
        .premium-gate-icon { font-size: 52px; margin-bottom: 16px; }
        .premium-gate-title { font-size: 20px; font-weight: 800; color: var(--gold); margin-bottom: 10px; }
        .premium-gate-sub { font-size: 14px; color: var(--text3); line-height: 1.6; margin-bottom: 24px; max-width: 280px; }
    </style>
</head>
<body>

<div class="header">
    <button class="header-back" onclick="navigateTo('index.html')">‹</button>
    <div class="header-title">AI Assistant</div>
    <span class="tag tag-gold" style="font-size:10px;">Premium</span>
</div>

<div class="chat-outer" id="chatOuter">
    <div style="display:flex;align-items:center;justify-content:center;flex:1;">
        <div class="spinner"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const supabaseClient = supabase.createClient(
        'https://yljztfajyvjzqikxdddf.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlsanp0ZmFqeXZqenFpa3hkZGRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk2MjMzMDYsImV4cCI6MjA4NTE5OTMwNn0.O3qRONKT4XdEoSZTPg0Lg_tLyThMxRAMWjGwHy5W5JM',
        { auth: { persistSession: true, storageKey: 'tsp-auth-token', storage: window.localStorage, autoRefreshToken: true, detectSessionInUrl: false } }
    );

    const GROK_URL = 'https://yljztfajyvjzqikxdddf.supabase.co/functions/v1/grok-assistant';
    let messages = [], selectedManualPath = '', isTyping = false, currentUserId = null, isListening = false;

    supabaseClient.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_OUT' && !session && typeof Android !== 'undefined') Android.clearSession();
    });

    function saveState() {
        try {
            sessionStorage.setItem('tsp_ai_msgs', JSON.stringify(messages));
            sessionStorage.setItem('tsp_ai_manual', selectedManualPath);
            const mfr = document.getElementById('mfrSelect')?.value || '';
            sessionStorage.setItem('tsp_ai_mfr', mfr);
        } catch(e) {}
    }
    function loadState() {
        try {
            const m = sessionStorage.getItem('tsp_ai_msgs');
            const man = sessionStorage.getItem('tsp_ai_manual');
            if (m) messages = JSON.parse(m);
            if (man) selectedManualPath = man;
        } catch(e) {}
    }

    async function initPage() {
        if (_pendingSession) {
            try { await supabaseClient.auth.setSession({ access_token: _pendingSession.access_token, refresh_token: _pendingSession.refresh_token }); } catch(e) {}
        }
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) { navigateTo('index.html'); return; }
        currentUserId = user.id;

        const { data: sub } = await supabaseClient.from('subscriptions').select('tier,status').eq('user_id', user.id).single();
        const isPremium = sub && ['premium','team','enterprise'].includes(sub.tier) && sub.status === 'active';

        if (isPremium) { buildChatUI(); loadState(); await loadManuals(); renderSavedMessages(); }
        else { buildGateUI(); }
    }

    let allManuals = [];

    async function loadManuals() {
        const { data } = await supabaseClient.from('manuals').select('title,storage_path,brand').order('brand').order('title');
        if (!data) return;
        allManuals = data;

        // Populate manufacturer dropdown with unique brands
        const brands = [...new Set(data.map(m => m.brand))].sort();
        const mfrSel = document.getElementById('mfrSelect');
        if (!mfrSel) return;
        brands.forEach(b => {
            const o = document.createElement('option');
            o.value = b; o.textContent = b;
            mfrSel.appendChild(o);
        });

        // Restore saved state
        if (selectedManualPath) {
            const saved = allManuals.find(m => m.storage_path === selectedManualPath);
            if (saved) {
                mfrSel.value = saved.brand;
                mfrSel.classList.add('has-value');
                populateModels(saved.brand, selectedManualPath);
            }
        }
    }

    function populateModels(brand, selectPath = '') {
        const modelSel = document.getElementById('manualSelect');
        const modelRow = document.getElementById('modelRow');
        if (!modelSel || !modelRow) return;
        modelSel.innerHTML = '<option value="">Select model...</option>';
        const models = allManuals.filter(m => m.brand === brand);
        models.forEach(m => {
            const o = document.createElement('option');
            o.value = m.storage_path; o.textContent = m.title;
            modelSel.appendChild(o);
        });
        modelRow.classList.add('enabled');
        if (selectPath) {
            modelSel.value = selectPath;
            modelSel.classList.add('has-value');
        }
    }

    function onMfrChange() {
        const mfrSel = document.getElementById('mfrSelect');
        const modelSel = document.getElementById('manualSelect');
        const modelRow = document.getElementById('modelRow');
        const brand = mfrSel.value;
        mfrSel.classList.toggle('has-value', !!brand);
        // Reset model selection
        selectedManualPath = '';
        if (modelSel) { modelSel.innerHTML = '<option value="">Select model...</option>'; modelSel.classList.remove('has-value'); }
        if (!brand) { modelRow.classList.remove('enabled'); return; }
        populateModels(brand);
        saveState();
    }

    function buildChatUI() {
        document.getElementById('chatOuter').innerHTML = `
            <div class="context-bar">
                <div class="context-row">
                    <span class="context-label">Brand</span>
                    <select class="context-select" id="mfrSelect" onchange="onMfrChange()">
                        <option value="">Select manufacturer...</option>
                    </select>
                </div>
                <div class="context-row" id="modelRow">
                    <span class="context-label">Manual</span>
                    <select class="context-select" id="manualSelect" onchange="onManualChange()">
                        <option value="">Select model...</option>
                    </select>
                </div>
            </div>
            <div class="quick-row">
                <button class="quick-chip" onclick="quickPrompt('What are the most common fault codes for this system?')">⚡ Fault codes</button>
                <button class="quick-chip" onclick="quickPrompt('Walk me through the calibration procedure')">🔧 Calibration</button>
                <button class="quick-chip" onclick="quickPrompt('What are the laser safety precautions?')">⚠️ Safety</button>
                <button class="quick-chip" onclick="quickPrompt('What spare parts should I carry for this system?')">🔩 Spare parts</button>
                <button class="quick-chip" onclick="quickPrompt('What preventive maintenance steps should I perform?')">📋 PM steps</button>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div data-welcome style="text-align:center;color:var(--text3);font-size:13px;padding:20px 0;">
                    👋 Select a manual above and start asking questions.
                </div>
            </div>
            <div class="chat-input-area">
                <textarea id="chatInput" placeholder="Ask about any laser system..." rows="1"
                    onkeydown="onKey(event)" oninput="autoResize(this)"></textarea>
                <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
            </div>
        `;
    }

    function buildGateUI() {
        document.getElementById('chatOuter').innerHTML = `
            <div class="premium-gate">
                <div class="premium-gate-icon">🤖</div>
                <div class="premium-gate-title">Premium Feature</div>
                <div class="premium-gate-sub">The AI troubleshooting assistant requires a Premium or Team subscription.</div>
                <button class="btn btn-gold" onclick="navigateTo('paywall.html')">Upgrade to Premium</button>
            </div>
        `;
    }

    function renderSavedMessages() {
        if (!messages.length) return;
        const c = document.getElementById('chatMessages');
        if (!c) return;
        c.innerHTML = '';
        messages.forEach(m => renderMessage(m.role, m.content, false));
    }

    function onManualChange() {
        const sel = document.getElementById('manualSelect');
        selectedManualPath = sel.value;
        sel.classList.toggle('has-value', !!selectedManualPath);
        saveState();
    }

    function renderMessage(role, content, scroll = true) {
        const c = document.getElementById('chatMessages');
        if (!c) return;
        const welcome = c.querySelector('[data-welcome]'); if (welcome) welcome.remove();
        const d = document.createElement('div');
        d.className = 'msg ' + role;
        const time = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
        const html = content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
        d.innerHTML = `<div class="msg-bubble">${html}</div><div class="msg-time">${time}</div>`;
        c.appendChild(d);
        if (scroll) c.scrollTop = c.scrollHeight;
    }

    function addMessage(role, content) { messages.push({role, content}); renderMessage(role, content); saveState(); }
    function showTyping() { const c = document.getElementById('chatMessages'); if (!c) return; const d = document.createElement('div'); d.className='msg assistant'; d.id='typing'; d.innerHTML='<div class="msg-bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>'; c.appendChild(d); c.scrollTop=c.scrollHeight; }
    function hideTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

    async function sendMessage() {
        const inp = document.getElementById('chatInput'); if (!inp) return;
        const text = inp.value.trim(); if (!text || isTyping) return;
        inp.value = ''; inp.style.height = '42px';
        addMessage('user', text);
        isTyping = true;
        const sb = document.getElementById('sendBtn'), mb = document.getElementById('micBtn');
        if (sb) sb.disabled = true; if (mb) mb.disabled = true;
        showTyping();
        try {
            const { data: { session } } = await supabaseClient.auth.getSession();
            const token = session?.access_token || '';
            const sysPrompt = selectedManualPath
                ? `You are an expert medical laser service technician. The technician is referencing manual: ${selectedManualPath}. Answer field service questions concisely.`
                : `You are an expert medical laser service technician specializing in Lumenis, Candela, Cynosure, Cutera, Coherent, Fotona. Answer field service questions concisely.`;
            const resp = await fetch(GROK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ action:'chat', userId:currentUserId, messages:[{role:'system',content:sysPrompt},...messages.slice(-10)], collectionId:null })
            });
            const data = await resp.json();
            hideTyping();
            addMessage('assistant', !resp.ok ? '⚠️ '+(data.error||'Request failed.') : (data.choices?.[0]?.message?.content || 'Could not process that.'));
        } catch(e) { hideTyping(); addMessage('assistant','⚠️ Connection error. Please try again.'); }
        isTyping = false;
        if (sb) sb.disabled = false; if (mb) mb.disabled = false;
    }

    function toggleMic() {
        if (typeof Android === 'undefined' || !Android.startVoiceRecognition) { showToast('Voice input not available'); return; }
        if (isListening) { Android.stopVoiceRecognition(); setMicState(false); }
        else { Android.startVoiceRecognition(); setMicState(true); }
    }
    function setMicState(on) { isListening = on; const btn = document.getElementById('micBtn'); if (!btn) return; btn.classList.toggle('listening', on); btn.textContent = on ? '🔴' : '🎤'; }
    window.onSpeechResult = function(text) { setMicState(false); if (text?.trim()) { const inp = document.getElementById('chatInput'); if (inp) { inp.value=text.trim(); autoResize(inp); } setTimeout(sendMessage,300); } };
    window.onSpeechError = function(err) { setMicState(false); if (err && err !== 'cancelled') showToast('Voice error: '+err); };

    function quickPrompt(text) { const inp = document.getElementById('chatInput'); if (inp) { inp.value=text; autoResize(inp); } sendMessage(); }
    function onKey(e) { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); sendMessage(); } }
    function autoResize(el) { el.style.height='42px'; el.style.height=Math.min(el.scrollHeight,110)+'px'; }

    function navigateTo(page) {
        try {
            const s = JSON.parse(localStorage.getItem('tsp-auth-token'))?.currentSession;
            if (s?.access_token) { const sep = page.includes('?')?'&':'?'; window.location.href = page+sep+'_s='+btoa(JSON.stringify(s)); return; }
        } catch(e) {}
        window.location.href = page;
    }

    function showToast(msg, type='') {
        const t = document.getElementById('toast'); t.textContent=msg; t.className='toast show'+(type?' '+type:'');
        clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),3000);
    }

    if (_pendingSession) { initPage(); }
    else { supabaseClient.auth.getSession().then(({data:{session}})=>{ if(session) initPage(); else navigateTo('index.html'); }); }
</script>
</body>
</html>
