<!DOCTYPE html>
<html dir="ltr" mozdisallowselectionprint>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>PDF.js viewer</title>

  <!-- PATCH: Disable origin check so we can load PDFs from Supabase (https) while running from file:// -->
  <script>
    // This must run BEFORE pdf.mjs is loaded
    window.PDFJS = window.PDFJS || {};
    window.PDFJS.disableWorker = true;
    window.PDFJS.disableRange = true;
    window.PDFJS.disableStream = true;
    window.PDFJS.disableAutoFetch = true;
    window.PDFJS.disableCreateObjectURL = true;
    window.PDFJS.disableFontFace = true;
  </script>

  <link rel="stylesheet" href="viewer.css">
  <script src="../build/pdf.mjs" type="module"></script>
  <script src="viewer.mjs" type="module"></script>
</head>

<body tabindex="1">
<div id="outerContainer">
  <div id="sidebarContainer">
    <!-- Sidebar content -->
  </div>
  <div id="mainContainer">
    <div class="toolbar">
      <!-- Toolbar -->
    </div>
    <div id="viewerContainer">
      <div id="viewer" class="pdfViewer"></div>
    </div>
  </div>
</div>

<div id="loadingBar">
  <div class="progress"></div>
  <div class="glimmer"></div>
</div>

<div id="errorWrapper" hidden="true">
  <div id="errorMessageLeft">
    <span id="errorMessage"></span>
    <button id="errorShowMore">More Information</button>
  </div>
  <div id="errorMessageRight">
    <button id="errorClose">Close</button>
  </div>
  <div class="clearBoth"></div>
  <textarea id="errorMoreInfo" hidden="true" readonly="readonly"></textarea>
</div>

<div id="printContainer"></div>
</body>
</html>
